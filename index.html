<!doctype html><html lang='th'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>DNA ANALYZER v3.7 — FBI CYBER FORENSICS</title><style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap');
*{box-sizing:border-box;margin:0;padding:0;user-select:none;font-family:inherit}
button,input,textarea,select{font-family:inherit}
:root{--cyan:#00ffc8;--blue:#0090ff;--purple:#7b61ff;--red:#ff4d6a;--orange:#ff9f1c;--green:#00ff96;--gold:#ffcc00;--bg:#030810;--border:rgba(0,255,200,.08);--text:#c8e6ff;--muted:#4a7a9a;--mono:'Share Tech Mono',monospace}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans Thai',sans-serif;font-weight:400;font-size:16px;line-height:1.5;min-height:100vh;overflow:hidden;position:fixed;inset:0}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 50%,rgba(0,255,200,.018) 0%,transparent 50%),radial-gradient(ellipse at 85% 20%,rgba(0,100,180,.02) 0%,transparent 50%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,255,200,.005) 3px,rgba(0,255,200,.015) 6px);pointer-events:none;z-index:1;animation:scanlines 8s linear infinite}

@keyframes scanlines{0%{transform:translateY(0)}100%{transform:translateY(6px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{0%{transform:scale(0);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes successBounce{0%{transform:scale(0)}50%{transform:scale(1.3)}70%{transform:scale(.9)}100%{transform:scale(1)}}
@keyframes failShake{0%,100%{transform:translateX(0)}15%{transform:translateX(-10px)}30%{transform:translateX(10px)}45%{transform:translateX(-8px)}60%{transform:translateX(8px)}75%{transform:translateX(-4px)}90%{transform:translateX(4px)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(0,255,200,.15),inset 0 0 20px rgba(0,255,200,.03)}50%{box-shadow:0 0 30px rgba(0,255,200,.25),inset 0 0 30px rgba(0,255,200,.05)}}
@keyframes dotPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.6)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes corePulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:1}50%{transform:translate(-50%,-50%) scale(1.3);opacity:.7}}
@keyframes timerGlow{0%,100%{text-shadow:0 0 30px rgba(0,255,200,.4)}50%{text-shadow:0 0 50px rgba(0,255,200,.7)}}
@keyframes hitPulse{0%,100%{box-shadow:0 0 24px rgba(255,159,28,.6);transform:scaleY(1)}50%{box-shadow:0 0 36px rgba(255,159,28,.9);transform:scaleY(1.15)}}
@keyframes terminalCursor{0%,100%{opacity:1}50%{opacity:0}}
@keyframes dataStream{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
@keyframes glitchText{0%,100%{transform:translate(0)}2%{transform:translate(-4px,2px) skewX(-5deg)}4%{transform:translate(3px,-2px) skewX(3deg)}6%{transform:translate(-2px,3px)}8%{transform:translate(0)}}
@keyframes screenShake{0%,100%{transform:translate(0)}5%{transform:translate(-6px,4px) rotate(-1deg)}10%{transform:translate(6px,-3px) rotate(1deg)}15%{transform:translate(-4px,5px) rotate(-.5deg)}20%{transform:translate(5px,-4px) rotate(.5deg)}25%{transform:translate(-3px,2px)}30%{transform:translate(3px,-5px)}35%{transform:translate(-5px,3px)}40%{transform:translate(2px,-2px)}45%{transform:translate(-2px,4px)}50%{transform:translate(0)}}
@keyframes warningStrobe{0%,100%{opacity:0}4%{opacity:.9}8%{opacity:0}12%{opacity:.5}14%{opacity:0}22%{opacity:.7}24%{opacity:0}35%{opacity:.3}38%{opacity:0}50%{opacity:.6}52%{opacity:0}}
@keyframes redPulse{0%,100%{box-shadow:0 0 40px rgba(255,0,68,.08)}50%{box-shadow:0 0 80px rgba(255,0,68,.25)}}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}

/* Case Screen — HACKER TERMINAL */
#caseScreen{position:absolute;z-index:300;display:flex;align-items:center;justify-content:center;inset:0;background:var(--bg)}
.case-box{text-align:center;padding:48px 44px;background:linear-gradient(160deg,rgba(8,18,34,.98) 0%,rgba(4,8,16,.99) 100%);border:1px solid var(--border);border-radius:16px;width:92%;max-width:480px;box-shadow:0 0 80px rgba(0,255,200,.03),0 0 160px rgba(0,200,180,.015),inset 0 0 60px rgba(0,255,200,.02);backdrop-filter:blur(24px);animation:boxIn .7s ease-out;position:relative;overflow:hidden}
.case-box::before{content:'FBI_DB:~/cases/$';position:absolute;top:12px;left:16px;font-family:var(--mono);font-size:9px;color:var(--muted);opacity:.35;letter-spacing:2px}
.case-box::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);animation:dataStream 3s linear infinite}
@keyframes boxIn{from{opacity:0;transform:translateY(40px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.case-box .logo{width:90px;height:90px;margin:0 auto 24px}
.case-box .logo svg{width:100%;height:100%;filter:drop-shadow(0 0 20px rgba(0,255,200,.3))}
.case-box .logo svg circle{stroke:rgba(0,255,200,.15)!important}
.case-box .logo svg path{stroke:var(--cyan)!important;opacity:.6!important}
.case-box h1{font-size:28px;font-weight:700;letter-spacing:4px;color:var(--cyan);text-shadow:0 0 20px rgba(0,255,200,.4),0 0 40px rgba(0,255,200,.15);margin-bottom:4px;animation:fadeUp .6s ease-out .5s both,glitchText 8s ease-in-out 1s infinite;font-family:var(--mono)}
.case-box .sub{color:var(--muted);font-size:12px;font-weight:500;letter-spacing:5px;text-transform:uppercase;margin-bottom:28px;animation:fadeUp .6s ease-out .6s both;font-family:var(--mono)}
.case-box .case-visual{display:flex;gap:10px;justify-content:center;margin-bottom:24px;animation:fadeUp .6s ease-out .7s both}
.case-box .case-char{width:64px;height:76px;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:700;letter-spacing:2px;border:2px solid rgba(0,255,200,.12);border-radius:10px;background:rgba(8,18,34,.9);color:var(--cyan);transition:all .35s cubic-bezier(.4,0,.2,1);font-family:var(--mono);text-shadow:0 0 10px rgba(0,255,200,.3)}
.case-box .case-char.waiting{border-color:var(--cyan);box-shadow:0 0 20px rgba(0,255,200,.15),inset 0 0 20px rgba(0,255,200,.03);animation:glow 2s ease-in-out infinite}
.case-box .case-char.done{border-color:rgba(0,255,200,.4);background:rgba(0,255,200,.06);color:var(--cyan);animation:popIn .3s ease-out}
.case-box .case-char.locked{border-color:var(--cyan);background:rgba(0,255,200,.1);color:var(--cyan);box-shadow:0 0 20px rgba(0,255,200,.25),inset 0 0 20px rgba(0,255,200,.05);animation:popIn .3s ease-out}
.case-box .error{color:var(--red);font-size:14px;min-height:24px;margin-top:14px;font-weight:500;letter-spacing:2px;font-family:var(--mono);text-shadow:0 0 10px rgba(255,0,68,.3)}
.case-box .btn{margin-top:8px}

/* Buttons — HACKER TERMINAL */
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 28px;font-size:17px;font-weight:600;letter-spacing:3px;border:none;border-radius:8px;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);text-transform:uppercase;position:relative;overflow:hidden;font-family:var(--mono)}
.btn:disabled{opacity:.25;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.btn-primary{background:transparent;border:1px solid var(--cyan);color:var(--cyan);box-shadow:0 0 20px rgba(0,255,200,.1);text-shadow:0 0 10px rgba(0,255,200,.3)}
.btn-primary:hover:not(:disabled){background:rgba(0,255,200,.08);box-shadow:0 0 30px rgba(0,255,200,.2);border-color:var(--cyan)}
.btn-primary::after{content:'_';animation:terminalCursor 1s step-end infinite;margin-left:4px;opacity:.6}
.btn-ghost{background:transparent;border:1px solid rgba(0,255,200,.15);color:var(--muted);font-size:13px}
.btn-ghost:hover{background:rgba(0,255,200,.06);border-color:rgba(0,255,200,.3);color:var(--cyan)}
.btn-sm{padding:8px 16px;font-size:14px;font-weight:600;letter-spacing:2.5px}
.btn-danger{background:transparent;border:1px solid var(--red);color:var(--red);box-shadow:0 0 20px rgba(255,0,68,.1);text-shadow:0 0 10px rgba(255,0,68,.3)}
.btn-danger:hover:not(:disabled){background:rgba(255,0,68,.08);box-shadow:0 0 30px rgba(255,0,68,.2)}
.btn-warning{background:transparent;border:1px solid var(--orange);color:var(--orange);box-shadow:0 0 20px rgba(255,136,0,.1);text-shadow:0 0 10px rgba(255,136,0,.3)}
.btn-warning:hover:not(:disabled){background:rgba(255,136,0,.08);box-shadow:0 0 30px rgba(255,136,0,.2)}

/* Desktop — HACKER SHELL */
#desktop{position:absolute;inset:0;z-index:5;display:none;background:
  radial-gradient(ellipse at 20% 40%,rgba(0,255,200,.02) 0%,transparent 55%),
  radial-gradient(ellipse at 80% 30%,rgba(0,144,255,.018) 0%,transparent 55%),
  radial-gradient(ellipse at 50% 80%,rgba(0,100,180,.012) 0%,transparent 50%),
  var(--bg)}
#desktop.show{display:block}
#desktopCanvas{position:absolute;inset:0;z-index:1;pointer-events:none;opacity:.4}
#desktop::before{content:'';position:absolute;inset:0;background:
  repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(0,255,200,.015) 40px,rgba(0,255,200,.015) 41px),
  repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(0,255,200,.015) 40px,rgba(0,255,200,.015) 41px);
  pointer-events:none;z-index:0}
#desktop::after{content:'FBI DATABASE // root@fbi-db:~$  █';position:absolute;bottom:60px;right:30px;
  font-size:10px;letter-spacing:4px;font-family:var(--mono);
  color:rgba(0,255,200,.06);pointer-events:none;z-index:0;animation:terminalCursor 1.2s step-end infinite}
#caseBadge{position:fixed;top:14px;right:16px;z-index:10;
  font-size:12px;font-weight:500;letter-spacing:3px;font-family:var(--mono);
  color:var(--cyan);background:rgba(0,255,200,.04);border:1px solid rgba(0,255,200,.1);
  padding:7px 14px;border-radius:6px;pointer-events:none;box-shadow:0 0 15px rgba(0,255,200,.05)}
#desktopIcons{position:absolute;top:20px;left:20px;display:flex;flex-direction:column;gap:20px;z-index:2}
.desk-icon{display:flex;flex-direction:column;align-items:center;gap:5px;width:90px;padding:10px 8px;border-radius:8px;cursor:pointer;transition:.2s;text-align:center}
.desk-icon:hover{background:rgba(0,255,200,.05);transform:translateY(-3px)}
.desk-icon:active{transform:scale(.92)}
.desk-icon .ico{width:50px;height:50px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;background:rgba(0,255,200,.03);border:1px solid rgba(0,255,200,.08);box-shadow:0 4px 20px rgba(0,0,0,.4);transition:.3s}
.desk-icon:hover .ico{border-color:rgba(0,255,200,.2);box-shadow:0 6px 28px rgba(0,0,0,.5),0 0 30px rgba(0,255,200,.04);transform:translateY(-2px)}
.desk-icon.dna .ico{border-color:rgba(0,255,200,.12)}
.desk-icon.dna .ico svg path{stroke:var(--cyan)!important}
.desk-icon.search .ico{border-color:rgba(255,136,0,.12)}
.desk-icon.search .ico svg circle,.desk-icon.search .ico svg line{stroke:var(--orange)!important}
.desk-icon.suspects .ico{border-color:rgba(170,102,255,.12)}
.desk-icon.suspects .ico svg circle,.desk-icon.suspects .ico svg path{stroke:var(--purple)!important}
.desk-icon .lbl{font-size:12px;font-weight:500;letter-spacing:2px;color:var(--muted);line-height:1.3;word-break:break-word;font-family:var(--mono)}

/* Taskbar — HACKER SHELL */
#taskbar{position:fixed;bottom:0;left:0;right:0;height:40px;background:rgba(4,8,16,.98);border-top:1px solid rgba(0,255,200,.06);backdrop-filter:blur(16px);z-index:250;display:flex;align-items:center;padding:0 10px;gap:4px}
#taskbar::before{content:'FBI DATABASE v3.7';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-family:var(--mono);font-size:8px;color:rgba(0,255,200,.05);letter-spacing:10px;pointer-events:none}
#taskbar .task-clock{font-size:11px;color:var(--muted);margin-left:auto;letter-spacing:3px;padding:0 10px;font-family:var(--mono)}
.task-btn{display:flex;align-items:center;gap:6px;padding:5px 12px;font-size:11px;font-weight:500;letter-spacing:2px;color:var(--muted);background:rgba(0,255,200,.02);border:1px solid transparent;border-radius:6px;cursor:pointer;transition:.2s;height:30px;font-family:var(--mono)}
.task-btn:hover{background:rgba(0,255,200,.05);color:var(--text)}
.task-btn.active{background:rgba(0,255,200,.06);border-color:rgba(0,255,200,.1);color:var(--cyan)}
.task-btn .dot{width:5px;height:5px;border-radius:50%;background:var(--cyan);box-shadow:0 0 6px var(--cyan)}

/* Windows — HACKER TERMINALS */
.window{position:absolute;border:1px solid rgba(0,255,200,.05);border-radius:10px;
  background:linear-gradient(170deg,rgba(8,18,34,.98),rgba(4,8,16,.99));
  box-shadow:0 8px 48px rgba(0,0,0,.6),0 0 60px rgba(0,255,200,.01),inset 0 1px 0 rgba(0,255,200,.03);
  backdrop-filter:blur(20px);display:none;overflow:hidden;min-width:320px;min-height:200px}
.window.show{display:flex;flex-direction:column;animation:winOpen .3s cubic-bezier(.175,.885,.32,1.1)}
@keyframes winOpen{from{opacity:0;transform:scale(.92) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.window.maximized{border-radius:0;border:none;inset:0!important;width:100%!important;height:calc(100% - 40px)!important}
.win-header{display:flex;align-items:center;padding:8px 12px;background:rgba(0,255,200,.015);border-bottom:1px solid rgba(0,255,200,.03);cursor:default;flex-shrink:0}
.win-header:active{cursor:grabbing}
.win-dot{width:8px;height:8px;border-radius:50%;margin-right:8px;flex-shrink:0}
.win-dot.dna{background:var(--cyan);box-shadow:0 0 8px var(--cyan)}
.win-dot.search{background:var(--orange);box-shadow:0 0 8px var(--orange)}
.win-dot.suspects{background:var(--purple);box-shadow:0 0 8px var(--purple)}
.win-title{flex:1;font-size:12px;font-weight:600;letter-spacing:3px;color:var(--cyan);font-family:var(--mono)}
.win-controls{display:flex;gap:4px}
.win-controls button{width:26px;height:26px;border:none;border-radius:4px;background:rgba(0,255,200,.02);color:var(--muted);font-size:12px;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;font-family:var(--mono)}
.win-controls button:hover{background:rgba(0,255,200,.06);color:var(--cyan)}
.win-controls .win-close:hover{background:rgba(255,0,68,.2);color:var(--red)}
.win-body{flex:1;overflow:auto;padding:14px;position:relative}
.win-body::-webkit-scrollbar{width:3px}
.win-body::-webkit-scrollbar-track{background:rgba(0,255,200,.015)}
.win-body::-webkit-scrollbar-thumb{background:rgba(0,255,200,.08);border-radius:2px}
.win-resize{position:absolute;bottom:0;right:0;width:14px;height:14px;cursor:nwse-resize;z-index:10}
.win-resize::after{content:'';position:absolute;bottom:3px;right:3px;width:6px;height:6px;border-right:2px solid rgba(0,255,200,.1);border-bottom:2px solid rgba(0,255,200,.1)}

/* DNA Table — HACKER MATRIX */
.dna-table{width:100%;border-collapse:separate;border-spacing:0;transition:opacity .3s}
.dna-table.hidden{opacity:0;pointer-events:none}
.dna-table th,.dna-table td{padding:8px 6px;text-align:center;vertical-align:middle}
.dna-table th{border-bottom:1px solid rgba(0,255,200,.06);font-size:20px;font-weight:700;color:var(--cyan);letter-spacing:3px;font-family:var(--mono);text-shadow:0 0 10px rgba(0,255,200,.2)}
.dna-table th:first-child{font-size:10px;font-weight:500;color:var(--muted);text-align:right;padding-right:12px;width:60px;white-space:nowrap;letter-spacing:1px}
.dna-table td{border-bottom:1px solid rgba(0,255,200,.025)}
.dna-table td:first-child{font-size:12px;color:var(--muted);text-align:right;padding-right:12px;width:60px;white-space:nowrap;font-family:var(--mono);letter-spacing:1px}
.dna-table tr:last-child td{border-bottom:none}
.band-bar{height:10px;border-radius:4px;background:rgba(0,255,200,.025);position:relative;min-width:30px;transition:all .3s cubic-bezier(.4,0,.2,1)}
.band-bar.on{background:linear-gradient(90deg,var(--muted),var(--cyan));box-shadow:0 0 12px rgba(0,255,200,.2);height:12px}
.band-bar.on::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.15),transparent);border-radius:4px}
.band-bar.search-hit{background:linear-gradient(90deg,var(--orange),#ff6b00) !important;box-shadow:0 0 20px rgba(255,136,0,.5) !important;height:14px;animation:hitPulse 1s ease-in-out infinite}
.band-bar.band-guilty{background:linear-gradient(90deg,var(--red),#ff0044);box-shadow:0 0 20px rgba(255,0,68,.6);height:14px}
.band-bar.band-guilty::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.15),transparent);border-radius:4px}
.band-bar.band-neutral{opacity:.08}
.band-bar.band-marked{background:linear-gradient(90deg,var(--orange),#ffcc00) !important;box-shadow:0 0 20px rgba(255,136,0,.6) !important;height:14px}
.band-bar.search-found{background:linear-gradient(90deg,var(--gold),#ffaa00) !important;box-shadow:0 0 14px rgba(255,215,0,.35) !important;height:14px}
.band-bar.band-flash{background:linear-gradient(90deg,var(--red),#ff0044);box-shadow:0 0 40px rgba(255,0,68,1);height:14px;animation:revealFlash .4s ease-in-out infinite}
@keyframes revealFlash{0%,100%{opacity:1;box-shadow:0 0 25px rgba(255,0,68,.8)}50%{opacity:.2;box-shadow:0 0 60px rgba(255,0,68,1)}}
.dna-table td.row-guilty{color:var(--red);font-weight:700;font-family:var(--mono);text-shadow:0 0 10px rgba(255,0,68,.4)}

/* Search Program — HACKER CONSOLE */
.search-box{position:relative;margin-bottom:10px}
.search-box input{width:100%;padding:12px 14px 12px 40px;font-size:18px;font-weight:500;letter-spacing:3px;border:1px solid rgba(0,255,200,.08);border-radius:6px;background:rgba(8,18,34,.8);color:var(--cyan);outline:none;transition:.3s;font-family:var(--mono)}
.search-box input::placeholder{color:rgba(0,255,200,.15);font-size:14px;font-weight:400;letter-spacing:2px}
.search-box input:focus{border-color:rgba(0,255,200,.2);box-shadow:0 0 15px rgba(0,255,200,.04),inset 0 0 15px rgba(0,255,200,.01)}
.search-box svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:rgba(0,255,200,.15);transition:.3s}
.search-box input:focus+svg{color:var(--cyan)}
.search-actions{display:flex;gap:6px;margin-bottom:14px}
.section-label{font-size:10px;font-weight:600;letter-spacing:4px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px;font-family:var(--mono)}
.section-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(0,255,200,.06),transparent)}
.history-list{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;max-height:130px;overflow-y:auto;padding-right:4px}
.history-list::-webkit-scrollbar{width:3px}
.history-list::-webkit-scrollbar-track{background:rgba(0,255,200,.015)}
.history-list::-webkit-scrollbar-thumb{background:rgba(0,255,200,.06);border-radius:2px}
.history-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:rgba(0,255,200,.015);border:1px solid rgba(0,255,200,.03);border-radius:6px;font-size:13px;font-weight:500;letter-spacing:2px;color:var(--muted);transition:all .25s;cursor:pointer;font-family:var(--mono)}
.history-item:hover{border-color:rgba(0,255,200,.08);color:var(--text);background:rgba(0,255,200,.025);transform:translateX(3px)}
.history-item.active{border-color:var(--orange);color:var(--orange);background:rgba(255,136,0,.04);box-shadow:0 0 10px rgba(255,136,0,.05)}
.history-item .val{color:var(--cyan);font-weight:600;font-size:14px;letter-spacing:2px}
.history-item .num{color:rgba(0,255,200,.15);font-size:8px;min-width:20px}
.history-empty{font-size:12px;color:rgba(0,255,200,.1);font-style:italic;text-align:center;padding:10px;letter-spacing:2px;font-family:var(--mono)}
.status-bar{display:flex;align-items:center;gap:6px;padding:10px 14px;border-radius:6px;font-size:12px;font-weight:500;letter-spacing:3px;color:var(--muted);background:rgba(0,255,200,.015);border:1px solid rgba(0,255,200,.03);transition:.3s;font-family:var(--mono)}

// === SEARCH BEAM ===
function animateBeamRect(fromRect,toRect,resultColor,callback,onArrive){
  if(!fromRect||!toRect||!fromRect.width||!toRect.width){if(callback)callback();return}
  var grayColor='#4a7a9a';
  var x1=fromRect.left+fromRect.width/2,y1=fromRect.top+fromRect.height/2;
  var x2=toRect.left+toRect.width/2,y2=toRect.top+toRect.height/2;
  var topY=Math.min(y1,y2)-60;
  var pathD='M '+x1+' '+y1+' L '+x1+' '+topY+' L '+x2+' '+topY+' L '+x2+' '+y2;
  var beam=document.createElement('div');
  beam.id='linkBeam';beam.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;z-index:900;pointer-events:none';
  var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.style.cssText='width:100%;height:100%;position:absolute;top:0;left:0';
  var path=document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d',pathD);
  path.style.stroke=grayColor;
  path.setAttribute('stroke-width','4');
  path.setAttribute('fill','none');
  path.setAttribute('stroke-linecap','round');
  path.setAttribute('stroke-linejoin','round');
  path.setAttribute('opacity','0.8');
  svg.appendChild(path);beam.appendChild(svg);document.body.appendChild(beam);
  var totalLen=path.getTotalLength();
  path.setAttribute('stroke-dasharray',totalLen);
  path.setAttribute('stroke-dashoffset',totalLen);
  var T=1400;
  var start=null;
  function step(ts){
    if(!start)start=ts;
    var p=Math.min(1,(ts-start)/T);
    var drawn=totalLen*p;
    path.setAttribute('stroke-dashoffset',totalLen-drawn);
    if(p<1){
      requestAnimationFrame(step);
    }else{
      if(typeof onArrive==='function')onArrive();
      path.style.stroke=resultColor;
      path.setAttribute('stroke-width','6');
      path.setAttribute('opacity','1');
      setTimeout(function(){
        beam.style.transition='opacity .5s';
        beam.style.opacity='0';
        setTimeout(function(){beam.remove();if(callback)callback()},500);
      },400);
    }
  }
  requestAnimationFrame(step);
}

go.onclick=function(){

        setTimeout(function(){
          var toRect=cell.getBoundingClientRect();

// === GAME LOGIC ===
function resetCaseUI(){caseStep=0;caseDigit=null;chars[0].textContent='?';chars[0].className='case-char waiting';chars[1].textContent='?';chars[1].className='case-char';chars[2].textContent='?';chars[2].className='case-char';chars[3].textContent='?';chars[3].className='case-char';caseError.textContent=''}
function showCase(){stopDesktopRain();hideMugshot();hideTerminal();activeCase='';history.length=0;activeHit=null;revealedState=null;revealPhase=null;q.value='';go.disabled=true;renderHistory();setStatus(__('ready'),false);desktop.classList.remove('show');caseScreen.style.display='flex';caseBadge.textContent='';resetCaseUI();document.addEventListener('keydown',caseKeyHandler)}
function caseKeyHandler(e){
  if(e.key==='Enter'){caseSubmit.click();return}
  if(e.key==='Backspace'){if(caseDigit!==null){caseDigit=null;chars[3].textContent='?';chars[3].className='case-char'}else if(caseStep>0){caseStep--;chars[caseStep].textContent='?';chars[caseStep].className=caseStep===0?'case-char waiting':'case-char'}caseError.textContent='';return}
  if(caseStep<3){chars[caseStep].textContent=['A','0','0'][caseStep];chars[caseStep].className='case-char done';caseStep++;chars[caseStep<3?caseStep:3].className='case-char waiting'}
  else if(caseStep===3&&validSuffixes.indexOf(e.key)!==-1){caseDigit=e.key;chars[3].textContent=e.key;chars[3].className='case-char locked'}
}
caseSubmit.onclick=function(){if(caseStep!==3||caseDigit===null){caseError.textContent=__('errEnter')+validSuffixes.join('/');return}document.removeEventListener('keydown',caseKeyHandler);showMain('A00'+caseDigit)};

function showMain(c){
  activeCase=c.toUpperCase();caseScreen.style.display='none';desktop.classList.add('show');
  caseBadge.textContent='['+activeCase+']';
  history.length=0;activeHit=null;revealedState=null;revealPhase=null;
  q.value='';go.disabled=true;renderHistory();setStatus(__('ready'),false);
  loadLayout();maxZ=102;
  Object.keys(wins).forEach(function(id){
    if(wins[id].z>maxZ)maxZ=wins[id].z;
    var w=wins[id];
    if(w.open){
      w.el.style.left=w.x+'px';w.el.style.top=w.y+'px';w.el.style.width=w.w+'px';w.el.style.height=w.h+'px';
      w.el.style.zIndex=w.z;w.el.classList.add('show');
      if(w.min)w.el.style.display='none';
      if(w.max)w.el.classList.add('maximized');
    }
  });
  if(wins.dna.open)draw();
  if(wins.suspects.open)renderProfiles();
  renderTaskbar();
  startDesktopRain();
}
function showResetConfirm(){
  var confirmOverlay=document.createElement('div');
  confirmOverlay.className='confirm-overlay';
  confirmOverlay.style.zIndex='550';
  confirmOverlay.innerHTML='<div class="confirm-box"><h3>NEW CASE</h3><div class="confirm-sub">ALL DATA WILL BE PURGED. CONTINUE?</div><div class="confirm-actions"><button class="btn btn-danger btn-sm" id="resetConfirmYes">[YES]</button><button class="btn btn-cancel btn-sm" id="resetConfirmNo">[NO]</button></div></div>';
  document.body.appendChild(confirmOverlay);
  document.getElementById('resetConfirmNo').onclick=function(){confirmOverlay.remove()};
  document.getElementById('resetConfirmYes').onclick=function(){confirmOverlay.remove();showCase()};
  confirmOverlay.onclick=function(e){if(e.target===confirmOverlay)confirmOverlay.remove()};
}

function showLoading(callback){
  var duration=2000+Math.random()*2000;
  var msgs=lang.msgs;
  loadingSub.textContent=msgs[Math.floor(Math.random()*msgs.length)];loading.classList.add('show');
  var start=Date.now();
  var iv=setInterval(function(){var r=Math.max(0,(duration-(Date.now()-start))/1000);loadingTimer.textContent=r.toFixed(1);if(r<=0){clearInterval(iv);loading.classList.remove('show');callback()}},50);
}
function showDramaticResult(type, suspect, callback){
  var s={
    cls:'guilty', msg:'> ACCESS GRANTED', reveal:'SUBJECT: '+suspect, sub:'IDENTITY CONFIRMED — CASE CLOSED',
    shake:false, duration:10000, steps:['DECRYPTING...','SCANNING DNA...','MATCH 95%','VERIFYING...','MATCH 99.9%','MATCH 100%','LINK ESTABLISHED','IDENTITY LOCKED','> SYSTEM: ACCEPTED']
  };
  dramatic.className='dramatic-overlay show guilty';
  dramaticMsg.textContent=s.msg; dramaticReveal.textContent=s.reveal; dramaticSub.textContent=s.sub;
  dramaticCounter.style.display='block';var t=0;dramaticCounter.textContent=s.steps[0];
  var stepTime=s.duration/s.steps.length;
  var iv=setInterval(function(){t++;if(t>=s.steps.length){clearInterval(iv);dramatic.classList.remove('show');callback()}else{dramaticCounter.textContent=s.steps[t]}},stepTime);
}
function showToast(correct,suspect,sub){
  toast.className='result-toast show '+(correct?'correct':'wrong');toastOverlay.className='toast-overlay show';
  toastIcon.textContent=correct?'[OK]':'[ERR]';toastMsg.textContent=correct?'ACCESS GRANTED':'ACCESS DENIED';
  toastSub.textContent=sub||(correct?'SUBJECT '+suspect+': GUILTY':'SUBJECT '+suspect+': INNOCENT');
  setTimeout(function(){toast.className='result-toast';toastOverlay.className='toast-overlay'},2500);
}

// ===== RESET-LIKE TERMINALS (during flash phase) =====
var termWindows=[],termIntervals=[];
function hideTerminal(){
  termIntervals.forEach(function(iv){clearInterval(iv)});
  termIntervals=[];termWindows.forEach(function(el){el.remove()});termWindows=[];
}
function showTerminal(suspectId){
  var count=3+Math.floor(Math.random()*3);
  for(var t=0;t<count;t++)createTerminal(suspectId,t);
}
function createTerminal(suspectId,idx){
  var win=document.createElement('div');win.className='terminal-window';
  var w=360+Math.floor(Math.random()*180),h=260+Math.floor(Math.random()*160);
  var cx=Math.max(10,Math.floor((window.innerWidth-w)*(0.1+Math.random()*0.8)));
  var cy=Math.max(10,Math.floor((window.innerHeight-h)*(0.1+Math.random()*0.7)));
  win.style.cssText='left:'+cx+'px;top:'+cy+'px;width:'+w+'px;height:'+h+'px;z-index:'+(560+idx);
  var header=document.createElement('div');header.className='term-header';
  header.innerHTML='<div class="term-dot"></div><span class="term-title">DECODER.EXE</span><div class="term-controls"><button class="term-close">×</button></div>';
  var body=document.createElement('div');body.className='term-body';
  body.style.display='flex';body.style.gap='10px';body.style.flexDirection='column';
  var label=document.createElement('div');
  label.style.cssText='font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:3px;color:rgba(0,255,100,.15);text-align:center;margin:0 auto 4px;padding:4px 8px;border:1px solid rgba(0,255,100,.08);border-radius:4px;background:rgba(0,20,10,.2)';
  label.textContent='SUBJECT '+suspectId;
  body.appendChild(label);
  var lineWrap=document.createElement('div');
  body.appendChild(lineWrap);
  win.appendChild(header);win.appendChild(body);document.body.appendChild(win);
  var dx,dy,drg=false;
  header.addEventListener('mousedown',function(e){
    if(e.target.closest('.term-controls'))return;
    drg=true;dx=e.clientX-win.offsetLeft;dy=e.clientY-win.offsetTop;
  });
  document.addEventListener('mousemove',function(e){
    if(!drg)return;
    win.style.left=Math.max(-window.innerWidth+40,Math.min(e.clientX-dx,window.innerWidth-40))+'px';
    win.style.top=Math.max(-window.innerHeight+40,Math.min(e.clientY-dy,window.innerHeight-40))+'px';
  });
  document.addEventListener('mouseup',function(){drg=false});
  win.querySelector('.term-close').onclick=function(){
    clearInterval(iv);win.remove();
    var p=termWindows.indexOf(win);if(p!==-1)termWindows.splice(p,1);
    var q=termIntervals.indexOf(iv);if(q!==-1)termIntervals.splice(q,1);
  };
  var maxLines=60+Math.floor(Math.random()*40);
  var fillCount=0;
  var iv=setInterval(function(){
    var row='';var groups=6+Math.floor(Math.random()*10);
    for(var g=0;g<groups;g++){
      var len=2+Math.floor(Math.random()*10);
      for(var b=0;b<len;b++)row+=Math.random()>0.5?'1':'0';
      if(g<groups-1)row+=' ';
    }
    if(fillCount<maxLines){
      var line=document.createElement('div');line.className='term-line';
      line.textContent=row;lineWrap.appendChild(line);fillCount++;
    }else{
      lineWrap.removeChild(lineWrap.firstChild);
      var nl=document.createElement('div');nl.className='term-line';nl.textContent=row;lineWrap.appendChild(nl);
    }
    lineWrap.parentNode.scrollTop=lineWrap.parentNode.scrollHeight;
  },20+Math.floor(Math.random()*40));
  termWindows.push(win);termIntervals.push(iv);
}
function checkAutoReveal(){
  if(revealedState)return;
  var guiltyId=cases[activeCase];
  var allFound=true;
  suspects[guiltyId].forEach(function(band){
    if(history.indexOf(band)===-1)allFound=false;
  });
  if(allFound){
    revealedState={guilty:guiltyId};revealPhase='flash';go.disabled=true;
    draw();renderProfiles();
    setTimeout(function(){showTerminal(guiltyId)},5000);
    setTimeout(function(){
      hideTerminal();revealPhase='done';draw();renderProfiles();
      showDramaticResult('guilty',guiltyId,function(){
        showToast(true,guiltyId,'> SUBJECT '+guiltyId+' IDENTIFIED — CASE CLOSED');
        showMugshot(guiltyId);
      });
    },10000);
  }
}
var mugshotRainId=null,desktopRainId=null;
function showMugshot(id){
  var el=document.getElementById('mugshotOverlay');
  var img=document.getElementById('mugshotImg');
  var label=document.getElementById('mugshotLabel');
  var sub=document.getElementById('mugshotSub');
  var data=document.getElementById('mugshotData');
  var ext='.jpg';if('ACDE'.indexOf(id)!==-1)ext='.svg';
  img.innerHTML='<img src="'+id+ext+'" alt="SUBJECT '+id+'">';
  label.textContent='SUBJECT '+id;
  sub.textContent='IDENTITY CONFIRMED — CASE CLOSED ['+activeCase+']';
  data.innerHTML='<span>STATUS: <span class="d-pulse" style="color:var(--cyan)">ACTIVE</span></span><span>CASE: '+activeCase+'</span><span>CLASSIFIED</span>';
  el.classList.add('show');
  startMugshotRain();
}
function hideMugshot(){
  document.getElementById('mugshotOverlay').classList.remove('show');
  if(mugshotRainId){cancelAnimationFrame(mugshotRainId);mugshotRainId=null}
}
function startDesktopRain(){
  var c=document.getElementById('desktopCanvas');
  if(!c)return;
  var ctx=c.getContext('2d');
  var W=c.width=window.innerWidth;
  var H=c.height=window.innerHeight;
  var cols=Math.floor(W/30);
  var drops=[];
  for(var i=0;i<cols;i++){drops[i]={y:-Math.random()*H,speed:0.3+Math.random()*0.6,chars:''}}
  function draw(){
    if(!document.getElementById('desktop').classList.contains('show'))return;
    ctx.fillStyle='rgba(3,8,16,.04)';ctx.fillRect(0,0,W,H);
    ctx.font='10px "Share Tech Mono",monospace';
    for(var i=0;i<drops.length;i++){
      var d=drops[i];
      if(Math.random()>0.7)d.chars='0123456789ABCDEF'[Math.floor(Math.random()*16)];
      ctx.fillStyle='rgba(0,255,200,'+(0.02+Math.random()*0.03)+')';
      ctx.fillText(d.chars||'0',i*30+Math.random()*4,d.y);
      d.y+=d.speed;
      if(d.y>H+20){d.y=-20;d.speed=0.3+Math.random()*0.6}
    }
    desktopRainId=requestAnimationFrame(draw);
  }
  draw();
}
function stopDesktopRain(){
  if(desktopRainId){cancelAnimationFrame(desktopRainId);desktopRainId=null}
  var c=document.getElementById('desktopCanvas');
  if(c){var ctx=c.getContext('2d');if(ctx)ctx.clearRect(0,0,c.width,c.height)}
}
function startMugshotRain(){
  var c=document.getElementById('mugshotCanvas');
  if(!c)return;
  var ctx=c.getContext('2d');
  var W=c.width=window.innerWidth;
  var H=c.height=window.innerHeight;
  var cols=Math.floor(W/20);
  var drops=[];
  for(var i=0;i<cols;i++){drops[i]={y:Math.random()*H,speed:0.8+Math.random()*1.2,len:8+Math.floor(Math.random()*16)}}
  function draw(){
    if(!document.getElementById('mugshotOverlay').classList.contains('show'))return;
    ctx.fillStyle='rgba(3,8,16,.08)';ctx.fillRect(0,0,W,H);
    ctx.font='11px "Share Tech Mono",monospace';
    for(var i=0;i<drops.length;i++){
      var d=drops[i];
      for(var j=0;j<d.len;j++){
        var y=d.y-j*16;if(y<0||y>H)continue;
        var alpha=1-j/d.len;
        ctx.fillStyle='rgba(0,255,200,'+(alpha*0.12)+')';
        var hex='0123456789ABCDEF'[Math.floor(Math.random()*16)];
        ctx.fillText(hex,i*20+Math.random()*6,y);
      }
      d.y+=d.speed;
      if(d.y-16*d.len>H){d.y=-16*Math.floor(Math.random()*10);d.speed=0.8+Math.random()*1.2;d.len=8+Math.floor(Math.random()*16)}
    }
    mugshotRainId=requestAnimationFrame(draw);
  }
  draw();
}

loadLayout();
// Start
showCase();
})();
</script></body></html>
