<!doctype html><html lang='th'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>FBI Forensic DNA Analyzer</title><style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Inter:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--cyan:#00ffc8;--blue:#0090ff;--purple:#7b61ff;--red:#ff4d6a;--orange:#ff9f1c;--green:#00ff96;--bg:#030810;--border:rgba(0,255,200,.08);--text:#c8e6ff;--muted:#4a7a9a}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 50%,rgba(0,255,200,.025) 0%,transparent 50%),radial-gradient(ellipse at 85% 20%,rgba(0,144,255,.03) 0%,transparent 50%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,255,200,.005) 3px,rgba(0,255,200,.005) 6px);pointer-events:none;z-index:1;animation:scanlines 10s linear infinite}
@keyframes scanlines{0%{transform:translateY(0)}100%{transform:translateY(6px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideRight{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes popIn{0%{transform:scale(0);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes successBounce{0%{transform:scale(0)}50%{transform:scale(1.2)}70%{transform:scale(.9)}100%{transform:scale(1)}}
@keyframes failShake{0%,100%{transform:translateX(0)}15%{transform:translateX(-10px)}30%{transform:translateX(10px)}45%{transform:translateX(-8px)}60%{transform:translateX(8px)}75%{transform:translateX(-4px)}90%{transform:translateX(4px)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(0,255,200,.15),inset 0 0 20px rgba(0,255,200,.03)}50%{box-shadow:0 0 30px rgba(0,255,200,.25),inset 0 0 30px rgba(0,255,200,.05)}}
@keyframes dotPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.6)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes corePulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:1}50%{transform:translate(-50%,-50%) scale(1.3);opacity:.7}}
@keyframes timerGlow{0%,100%{text-shadow:0 0 30px rgba(0,255,200,.4)}50%{text-shadow:0 0 50px rgba(0,255,200,.7)}}
@keyframes bandAppear{from{transform:scaleX(0);opacity:0}to{transform:scaleX(1);opacity:1}}
@keyframes hitPulse{0%,100%{box-shadow:0 0 24px rgba(255,159,28,.6);transform:scaleY(1)}50%{box-shadow:0 0 36px rgba(255,159,28,.9);transform:scaleY(1.15)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulseRing{0%{transform:scale(.8);opacity:1}100%{transform:scale(2.5);opacity:0}}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}

#caseScreen{position:relative;z-index:10;display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
.case-box{text-align:center;padding:48px 44px;background:linear-gradient(160deg,rgba(10,22,40,.95) 0%,rgba(5,10,20,.98) 100%);border:1px solid var(--border);border-radius:24px;width:92%;max-width:480px;box-shadow:0 0 80px rgba(0,255,200,.04),0 0 160px rgba(0,144,255,.03),0 32px 64px rgba(0,0,0,.5);backdrop-filter:blur(24px);animation:boxIn .7s ease-out}
@keyframes boxIn{from{opacity:0;transform:translateY(40px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.case-box .logo{width:90px;height:90px;margin:0 auto 24px;animation:fadeIn 1s ease-out .3s both}
.case-box .logo svg{width:100%;height:100%;filter:drop-shadow(0 0 20px rgba(0,255,200,.3))}
.case-box h1{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;letter-spacing:4px;background:linear-gradient(135deg,var(--cyan),var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;animation:fadeUp .6s ease-out .5s both}
.case-box .sub{color:var(--muted);font-size:11px;letter-spacing:3px;text-transform:uppercase;margin-bottom:32px;animation:fadeUp .6s ease-out .6s both}
.case-box .case-visual{display:flex;gap:10px;justify-content:center;margin-bottom:24px;animation:fadeUp .6s ease-out .7s both}
.case-box .case-char{width:60px;height:72px;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:30px;font-weight:800;border:2px solid rgba(0,255,200,.12);border-radius:14px;background:rgba(0,8,16,.8);color:var(--cyan);transition:all .35s cubic-bezier(.4,0,.2,1)}
.case-box .case-char.waiting{border-color:var(--cyan);box-shadow:0 0 20px rgba(0,255,200,.15),inset 0 0 20px rgba(0,255,200,.03);animation:glow 2s ease-in-out infinite}
.case-box .case-char.done{border-color:rgba(0,255,200,.3);background:rgba(0,255,200,.04);color:var(--cyan);animation:popIn .3s ease-out}
.case-box .case-char.locked{border-color:var(--green);background:rgba(0,255,150,.06);color:var(--green);box-shadow:0 0 16px rgba(0,255,150,.15);animation:popIn .3s ease-out}
.case-box .error{color:var(--red);font-size:12px;min-height:20px;margin-top:14px;font-weight:500;letter-spacing:1px;animation:fadeIn .3s ease-out}
.case-box .btn{animation:fadeUp .6s ease-out .8s both}

.btn{display:inline-flex;align-items:center;justify-content:center;padding:14px 36px;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;border:none;border-radius:12px;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);text-transform:uppercase;position:relative;overflow:hidden}
.btn::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.1),transparent);opacity:0;transition:.3s}
.btn:hover::before{opacity:1}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.btn-primary{background:linear-gradient(135deg,var(--cyan),var(--blue));color:var(--bg);box-shadow:0 4px 24px rgba(0,255,200,.25)}
.btn-primary:hover:not(:disabled){box-shadow:0 8px 40px rgba(0,255,200,.4);transform:translateY(-2px)}
.btn-ghost{background:transparent;border:1px solid rgba(0,255,200,.2);color:var(--cyan)}
.btn-ghost:hover{background:rgba(0,255,200,.06);border-color:rgba(0,255,200,.4)}
.btn-sm{padding:10px 20px;font-size:11px;letter-spacing:1px}
.btn-danger{background:linear-gradient(135deg,var(--red),#e03050);color:#fff;box-shadow:0 4px 20px rgba(255,77,106,.2)}
.btn-danger:hover{box-shadow:0 8px 32px rgba(255,77,106,.35);transform:translateY(-2px)}
.btn-warning{background:linear-gradient(135deg,var(--orange),#e08800);color:var(--bg);box-shadow:0 4px 20px rgba(255,159,28,.2)}
.btn-warning:hover{box-shadow:0 8px 32px rgba(255,159,28,.35);transform:translateY(-2px)}

#mainScreen{position:relative;z-index:10;width:100%;min-height:100vh;display:none;flex-direction:column}
header{display:flex;align-items:center;gap:20px;padding:16px 32px;background:rgba(5,10,20,.9);border-bottom:1px solid var(--border);backdrop-filter:blur(24px);position:sticky;top:0;z-index:100}
header .fbi-badge{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),var(--blue));display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:9px;font-weight:900;color:var(--bg);letter-spacing:1px;box-shadow:0 0 16px rgba(0,255,200,.2);flex-shrink:0}
header h1{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:700;letter-spacing:3px;background:linear-gradient(90deg,var(--cyan),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;flex:1}
header .case-badge{font-family:'Share Tech Mono',monospace;background:rgba(0,255,200,.06);border:1px solid rgba(0,255,200,.12);padding:6px 16px;border-radius:8px;font-size:13px;color:var(--cyan);letter-spacing:2px}
.content{display:grid;grid-template-columns:1.3fr 1fr;gap:28px;padding:28px 32px;flex:1}
@media(max-width:960px){.content{grid-template-columns:1fr}}
.panel{background:linear-gradient(180deg,rgba(10,22,40,.8) 0%,rgba(5,12,25,.9) 100%);border:1px solid var(--border);border-radius:20px;padding:24px;position:relative;overflow:hidden}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,255,200,.2),transparent)}
.panel-header{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.panel-header .dot{width:8px;height:8px;border-radius:50%;background:var(--cyan);box-shadow:0 0 10px var(--cyan)}
.panel-header h2{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;color:var(--cyan);letter-spacing:3px;text-transform:uppercase}

.dna-table{width:100%;border-collapse:separate;border-spacing:0;transition:opacity .3s}
.dna-table.hidden{opacity:0;pointer-events:none}
.dna-table th{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;padding:14px 10px;color:var(--cyan);border-bottom:2px solid rgba(0,255,200,.15);text-align:center;letter-spacing:2px}
.dna-table th:first-child{width:70px;color:transparent}
.dna-table td{padding:10px 8px;border-bottom:1px solid rgba(0,255,200,.04);text-align:center;vertical-align:middle}
.dna-table td:first-child{font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--muted);text-align:right;padding-right:16px;width:70px;white-space:nowrap}
.dna-table tr:last-child td{border-bottom:none}
.dna-table tr:hover td{background:rgba(0,255,200,.015)}
.band-bar{height:14px;border-radius:7px;background:rgba(0,255,200,.04);position:relative;min-width:50px;transition:all .4s cubic-bezier(.4,0,.2,1)}
.band-bar.on{background:linear-gradient(90deg,var(--cyan),var(--blue));box-shadow:0 0 20px rgba(0,255,200,.4);height:16px}
.dna-table th.col-guilty,.dna-table td.col-guilty{background:rgba(255,77,106,.08)}
.dna-table th.col-guilty{color:var(--red);border-bottom-color:rgba(255,77,106,.3)}
.dna-table td.col-guilty .band-bar.on{background:linear-gradient(90deg,var(--red),#ff2040);box-shadow:0 0 20px rgba(255,77,106,.5)}
.dna-table th.col-innocent,.dna-table td.col-innocent{background:rgba(0,255,150,.06)}
.dna-table th.col-innocent{color:var(--green);border-bottom-color:rgba(0,255,150,.3)}
.dna-table td.col-innocent .band-bar.on{background:linear-gradient(90deg,var(--green),#00cc70);box-shadow:0 0 20px rgba(0,255,150,.5)}
.dna-table th.col-neutral{color:#1a3a4a;border-bottom-color:rgba(255,255,255,.03)}
.dna-table th.col-correct{color:var(--orange);border-bottom-color:rgba(255,159,28,.4)}
.dna-table td.row-guilty{color:var(--red);font-weight:700}
.dna-table td.row-innocent{color:var(--green);font-weight:700}
.dna-table td.row-correct{color:var(--orange);font-weight:700}
.dna-table td.row-neutral{color:#1a3a4a}
.band-bar.band-guilty{background:linear-gradient(90deg,var(--red),#ff2040);box-shadow:0 0 20px rgba(255,77,106,.6);height:18px}
.band-bar.band-guilty::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.25),transparent);border-radius:7px}
.band-bar.band-innocent{background:linear-gradient(90deg,var(--green),#00cc70);box-shadow:0 0 20px rgba(0,255,150,.6);height:18px}
.band-bar.band-innocent::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.25),transparent);border-radius:7px}
.band-bar.band-correct{background:linear-gradient(90deg,var(--orange),#ff8800);box-shadow:0 0 25px rgba(255,159,28,.6);height:18px}
.band-bar.band-correct::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.25),transparent);border-radius:7px}
.band-bar.band-neutral{opacity:.15}
.band-bar.on::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.3),transparent);border-radius:7px}
.band-bar.search-hit{background:linear-gradient(90deg,var(--orange),#ff6b00);box-shadow:0 0 24px rgba(255,159,28,.6);height:18px;animation:hitPulse 1.2s ease-in-out infinite}

.search-box{position:relative;margin-bottom:14px}
.search-box input{width:100%;padding:16px 20px 16px 48px;font-family:'Share Tech Mono',monospace;font-size:20px;letter-spacing:2px;border:1px solid rgba(0,255,200,.1);border-radius:12px;background:rgba(0,8,16,.6);color:var(--cyan);outline:none;transition:.3s}
.search-box input::placeholder{color:#1e4a5a;font-size:14px;letter-spacing:1px}
.search-box input:focus{border-color:rgba(0,255,200,.3);box-shadow:0 0 24px rgba(0,255,200,.08),inset 0 0 24px rgba(0,255,200,.02)}
.search-box svg{position:absolute;left:16px;top:50%;transform:translateY(-50%);width:20px;height:20px;color:#1e4a5a;transition:.3s}
.search-box input:focus+svg{color:var(--cyan)}
.search-actions{display:flex;gap:10px;margin-bottom:20px}

.section-label{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}
.history-list{display:flex;flex-direction:column;gap:6px;margin-bottom:18px;max-height:200px;overflow-y:auto;padding-right:4px}
.history-list::-webkit-scrollbar{width:3px}
.history-list::-webkit-scrollbar-track{background:rgba(0,255,200,.02);border-radius:2px}
.history-list::-webkit-scrollbar-thumb{background:rgba(0,255,200,.1);border-radius:2px}
.history-item{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(0,255,200,.02);border:1px solid rgba(0,255,200,.04);border-radius:10px;font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:1px;color:var(--muted);transition:all .3s;cursor:pointer}
.history-item:hover{border-color:rgba(0,255,200,.12);color:var(--text);background:rgba(0,255,200,.04);transform:translateX(4px)}
.history-item.active{border-color:var(--orange);color:var(--orange);background:rgba(255,159,28,.04);box-shadow:0 0 16px rgba(255,159,28,.08)}
.history-item .val{color:var(--cyan);font-weight:600;font-size:15px}
.history-item .num{color:#1e4a5a;font-size:10px;min-width:28px}
.history-empty{font-size:12px;color:#1a3a4a;font-style:italic;text-align:center;padding:16px;letter-spacing:1px}
.status-bar{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:10px;font-size:11px;letter-spacing:2px;color:var(--muted);background:rgba(0,255,200,.02);border:1px solid rgba(0,255,200,.04);transition:.3s}
.status-bar.processing{color:var(--cyan);border-color:rgba(0,255,200,.12);animation:statusPulse 2s ease-in-out infinite}
@keyframes statusPulse{0%,100%{opacity:1}50%{opacity:.6}}
.status-bar .dot{width:7px;height:7px;border-radius:50%;background:#1a3a4a;transition:.3s}
.status-bar.processing .dot{background:var(--cyan);box-shadow:0 0 10px var(--cyan);animation:dotPulse 1.2s ease-in-out infinite}

.modal-overlay{position:fixed;inset:0;background:rgba(3,8,16,.85);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.modal-overlay.show{display:flex;animation:fadeIn .3s ease-out}
.modal-box{text-align:center;padding:40px;background:linear-gradient(160deg,rgba(10,22,40,.98) 0%,rgba(5,10,20,.99) 100%);border:1px solid rgba(255,159,28,.15);border-radius:20px;width:90%;max-width:400px;box-shadow:0 0 60px rgba(255,159,28,.1),0 32px 64px rgba(0,0,0,.5);animation:popIn .4s cubic-bezier(.175,.885,.32,1.275)}
.modal-box .modal-icon{width:60px;height:60px;margin:0 auto 16px;border-radius:50%;background:rgba(255,159,28,.08);border:2px solid rgba(255,159,28,.2);display:flex;align-items:center;justify-content:center;font-size:28px}
.modal-box h3{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;color:var(--orange);letter-spacing:3px;margin-bottom:6px}
.modal-box .modal-sub{font-size:12px;color:var(--muted);letter-spacing:1px;margin-bottom:24px}
.modal-box input{width:120px;padding:16px;font-family:'Orbitron',sans-serif;font-size:40px;font-weight:900;letter-spacing:12px;text-align:center;border:2px solid rgba(255,159,28,.2);border-radius:14px;background:rgba(0,8,16,.8);color:var(--orange);outline:none;transition:.3s;text-transform:uppercase}
.modal-box input::placeholder{color:#3a2a1a}
.modal-box input:focus{border-color:var(--orange);box-shadow:0 0 30px rgba(255,159,28,.15)}
.modal-box .modal-actions{display:flex;gap:10px;justify-content:center;margin-top:20px}
.modal-box .btn-cancel{background:transparent;border:1px solid rgba(255,255,255,.1);color:var(--muted);padding:10px 24px;font-size:11px}
.modal-box .btn-cancel:hover{border-color:rgba(255,255,255,.2);color:var(--text)}

.result-toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:300;text-align:center;pointer-events:none;display:none}
.result-toast.show{display:block}
.result-toast .toast-icon{width:120px;height:120px;margin:0 auto 20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:60px;animation:successBounce .6s cubic-bezier(.175,.885,.32,1.275)}
.result-toast.correct .toast-icon{background:rgba(0,255,150,.1);border:3px solid var(--green);box-shadow:0 0 60px rgba(0,255,150,.3)}
.result-toast.wrong .toast-icon{background:rgba(255,77,106,.1);border:3px solid var(--red);box-shadow:0 0 60px rgba(255,77,106,.3);animation:failShake .6s ease-out}
.result-toast .toast-ring{position:absolute;inset:-10px;border-radius:50%;border:2px solid;animation:fadeOutRing 1s ease-out forwards}
.result-toast.correct .toast-ring{border-color:var(--green)}
.result-toast.wrong .toast-ring{border-color:var(--red)}
@keyframes fadeOutRing{to{transform:scale(1.8);opacity:0}}
.result-toast .toast-msg{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:900;letter-spacing:4px;animation:fadeUp .5s ease-out .3s both}
.result-toast.correct .toast-msg{color:var(--green)}
.result-toast.wrong .toast-msg{color:var(--red)}
.result-toast .toast-sub{font-size:13px;color:var(--muted);margin-top:8px;letter-spacing:2px;animation:fadeUp .5s ease-out .5s both}
.toast-overlay{position:fixed;inset:0;background:rgba(3,8,16,.8);z-index:299;display:none;backdrop-filter:blur(6px)}
.toast-overlay.show{display:block;animation:fadeIn .3s ease-out}

.loading-overlay{display:none;position:fixed;inset:0;background:rgba(3,8,16,.85);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.loading-overlay.show{display:flex;animation:fadeIn .3s ease-out}
.loading-box{text-align:center;animation:popIn .4s ease-out}
.loading-spinner{width:80px;height:80px;margin:0 auto 24px;position:relative}
.loading-spinner .ring{position:absolute;inset:0;border-radius:50%;border:3px solid transparent}
.loading-spinner .ring:nth-child(1){border-top-color:var(--cyan);animation:spin 1.2s linear infinite}
.loading-spinner .ring:nth-child(2){inset:8px;border-right-color:var(--blue);animation:spin 1.8s linear infinite reverse}
.loading-spinner .ring:nth-child(3){inset:16px;border-bottom-color:var(--purple);animation:spin 2.4s linear infinite}
.loading-spinner .core{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:12px;height:12px;background:var(--cyan);border-radius:50%;box-shadow:0 0 20px var(--cyan);animation:corePulse 1s ease-in-out infinite}
.loading-text{font-family:'Orbitron',sans-serif;font-size:13px;letter-spacing:4px;color:var(--cyan);margin-bottom:12px}
.loading-timer{font-family:'Share Tech Mono',monospace;font-size:48px;font-weight:700;color:var(--cyan);text-shadow:0 0 30px rgba(0,255,200,.4);animation:timerGlow 1s ease-in-out infinite}
.loading-sub{font-size:11px;color:var(--muted);letter-spacing:2px;margin-top:12px}
.dramatic-overlay{display:none;position:fixed;inset:0;background:rgba(60,0,0,.93);z-index:250;align-items:center;justify-content:center;backdrop-filter:blur(12px)}
.dramatic-overlay.show{display:flex;animation:fadeIn .2s ease-out}
.dramatic-box{text-align:center;animation:popIn .3s ease-out}
.dramatic-siren{width:80px;height:80px;margin:0 auto 20px;border:3px solid rgba(255,50,50,.4);border-radius:50%;display:flex;align-items:center;justify-content:center;animation:dramaticSiren .4s ease-in-out infinite;position:relative}
.dramatic-siren::before{content:'';position:absolute;inset:-10px;border-radius:50%;border:2px solid rgba(255,200,0,.2);animation:dramaticSiren .4s ease-in-out infinite reverse}
.dramatic-siren .inner{width:30px;height:30px;background:radial-gradient(circle,rgba(255,50,50,.9) 0%,transparent 70%);border-radius:50%;animation:dramaticPulse .3s ease-in-out infinite}
.dramatic-msg{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;letter-spacing:5px;color:#ff3333;text-shadow:0 0 30px rgba(255,0,0,.5);margin-bottom:6px}
.dramatic-sub{font-size:12px;color:rgba(255,150,100,.6);letter-spacing:3px;margin-bottom:20px}
.dramatic-counter{font-family:'Share Tech Mono',monospace;font-size:50px;font-weight:700;color:#ff5555;text-shadow:0 0 40px rgba(255,0,0,.5);animation:dramaticPulse .6s ease-in-out infinite}
@keyframes dramaticSiren{0%,100%{box-shadow:0 0 30px rgba(255,0,0,.5),inset 0 0 20px rgba(255,0,0,.1)}50%{box-shadow:0 0 50px rgba(255,200,0,.4),inset 0 0 30px rgba(255,200,0,.1)}}
@keyframes dramaticPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.15)}}
@keyframes shakeScreen{0%,100%{transform:translateX(0)}15%{transform:translateX(-10px)}30%{transform:translateX(10px)}45%{transform:translateX(-6px)}60%{transform:translateX(6px)}75%{transform:translateX(-3px)}90%{transform:translateX(3px)}}
.footer-line{position:fixed;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,255,200,.1),transparent);z-index:100}
</style></head><body>
<div class='footer-line'></div>
<div class='toast-overlay' id='toastOverlay'></div>
<div class='result-toast' id='resultToast'><div class='toast-ring'></div><div class='toast-icon' id='toastIcon'></div><div class='toast-msg' id='toastMsg'></div><div class='toast-sub' id='toastSub'></div></div>
<div class='loading-overlay' id='loadingOverlay'><div class='loading-box'><div class='loading-spinner'><div class='ring'></div><div class='ring'></div><div class='ring'></div><div class='core'></div></div><div class='loading-text'>ANALYZING</div><div class='loading-timer' id='loadingTimer'>3.0</div><div class='loading-sub' id='loadingSub'>SCANNING...</div></div></div>
<div class='dramatic-overlay' id='dramaticOverlay'><div class='dramatic-box'><div class='dramatic-siren'><div class='inner'></div></div><div class='dramatic-msg'>IDENTIFICATION FAILED</div><div class='dramatic-sub'>CRITICAL ERROR — DOUBLE MISMATCH</div><div class='dramatic-counter' id='dramaticCounter'>3</div></div></div>
<div class='modal-overlay' id='modalOverlay'>
  <div class='modal-box'>
    <div class='modal-icon'>🔍</div>
    <h3>IDENTIFY SUSPECT</h3>
    <div class='modal-sub'>Enter the suspect letter (A-E)</div>
    <input id='answerInput' placeholder='?' maxlength='1'>
    <div class='modal-actions'>
      <button class='btn btn-danger btn-sm' id='answerBtn'>SUBMIT</button>
      <button class='btn btn-cancel btn-sm' id='modalCancel'>CANCEL</button>
    </div>
  </div>
</div>
<div id='caseScreen'>
  <div class='case-box'>
    <div class='logo'>
      <svg viewBox='0 0 90 90' fill='none'>
        <circle cx='45' cy='45' r='42' stroke='rgba(0,255,200,.1)' stroke-width='1'/>
        <circle cx='45' cy='45' r='34' stroke='rgba(0,255,200,.06)' stroke-width='1' stroke-dasharray='3 3'><animateTransform attributeName='transform' type='rotate' from='0 45 45' to='360 45 45' dur='25s' repeatCount='indefinite'/></circle>
        <circle cx='45' cy='45' r='26' stroke='rgba(0,144,255,.08)' stroke-width='1' stroke-dasharray='2 4'><animateTransform attributeName='transform' type='rotate' from='360 45 45' to='0 45 45' dur='15s' repeatCount='indefinite'/></circle>
        <path d='M28 62 C28 32,45 18,45 45 C45 72,62 58,62 28' stroke='var(--cyan)' stroke-width='2' fill='none' opacity='.5'><animate attributeName='d' values='M28 62 C28 32,45 18,45 45 C45 72,62 58,62 28;M28 28 C28 58,45 72,45 45 C45 18,62 32,62 62;M28 62 C28 32,45 18,45 45 C45 72,62 58,62 28' dur='5s' repeatCount='indefinite'/></path>
        <path d='M62 62 C62 32,45 18,45 45 C45 72,28 58,28 28' stroke='var(--blue)' stroke-width='2' fill='none' opacity='.5'><animate attributeName='d' values='M62 62 C62 32,45 18,45 45 C45 72,28 58,28 28;M62 28 C62 58,45 72,45 45 C45 18,28 32,28 62;M62 62 C62 32,45 18,45 45 C45 72,28 58,28 28' dur='5s' repeatCount='indefinite'/></path>
        <circle cx='45' cy='30' r='3.5' fill='var(--cyan)' opacity='.7'><animate attributeName='opacity' values='.7;.4;.7' dur='3s' repeatCount='indefinite'/></circle>
        <circle cx='45' cy='60' r='3.5' fill='var(--blue)' opacity='.7'><animate attributeName='opacity' values='.7;.4;.7' dur='3s' repeatCount='indefinite' begin='1.5s'/></circle>
        <circle cx='30' cy='45' r='2.5' fill='var(--purple)' opacity='.5'/><circle cx='60' cy='45' r='2.5' fill='var(--red)' opacity='.5'/>
      </svg>
    </div>
    <h1>DNA ANALYZER</h1>
    <p class='sub'>Federal Bureau of Investigation — Forensic Unit</p>
    <div class='case-visual' id='caseVisual'>
      <div class='case-char waiting' id='char0'>?</div>
      <div class='case-char' id='char1'>?</div>
      <div class='case-char' id='char2'>?</div>
      <div class='case-char' id='char3'>?</div>
    </div>
    <div class='error' id='caseError'></div>
    <button class='btn btn-primary' id='caseSubmit'>ANALYZE</button>
  </div>
</div>
<div id='mainScreen'>
  <header>
    <div class='fbi-badge'>FBI</div>
    <h1>DNA ANALYZER</h1>
    <span class='case-badge' id='currentCase'></span>
    <button class='btn btn-ghost btn-sm' id='resetBtn'>NEW CASE</button>
  </header>
  <div class='content'>
    <section class='panel'>
      <div class='panel-header'><div class='dot'></div><h2>DNA Fingerprint</h2></div>
      <table class='dna-table' id='dna'></table>
    </section>
    <section class='panel'>
      <div class='panel-header'><div class='dot'></div><h2>Search Center</h2></div>
      <div class='search-box'>
        <input id='q' placeholder='Fragment size (100-1500)' type='number' min='100' max='1500'>
        <svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2'><circle cx='11' cy='11' r='8'/><line x1='21' y1='21' x2='16.65' y2='16.65'/></svg>
      </div>
      <div class='search-actions'>
        <button class='btn btn-primary btn-sm' id='go' disabled>SEARCH</button>
        <button class='btn btn-warning btn-sm' id='identifyBtn'>IDENTIFY SUSPECT</button>
      </div>
      <div class='section-label'>Search History</div>
      <div class='history-list' id='historyList'><div class='history-empty'>No searches yet</div></div>
      <div class='status-bar' id='statusBar'><div class='dot'></div><span id='statusText'>READY</span></div>
    </section>
  </div>
</div>
<script>
(function(){
var levels=[1500,1200,1000,800,600,400,200,100];
var suspects={A:[1500,1000,800,200,100],B:[1200,1000,600,400,100],C:[1500,1000,800,600,400],D:[1000,800,400,200,100],E:[1500,1200,600,200,100]};
var cases={A001:'B',A002:'E',A003:'D',A004:'A',A005:'C'};
var order=['A','B','C','D','E'];
var history=[],activeHit=null,activeCase='',caseStep=0,caseDigit=null,revealedState=null,wrongCount=0,innocentList=[];
var caseLabels=['A','0','0'];

var caseScreen=document.getElementById('caseScreen'),mainScreen=document.getElementById('mainScreen');
var chars=[document.getElementById('char0'),document.getElementById('char1'),document.getElementById('char2'),document.getElementById('char3')];
var caseError=document.getElementById('caseError'),caseSubmit=document.getElementById('caseSubmit');
var currentCase=document.getElementById('currentCase'),resetBtn=document.getElementById('resetBtn');
var dna=document.getElementById('dna'),q=document.getElementById('q'),go=document.getElementById('go');
var historyList=document.getElementById('historyList'),statusBar=document.getElementById('statusBar'),statusText=document.getElementById('statusText');
var identifyBtn=document.getElementById('identifyBtn');
var modalOverlay=document.getElementById('modalOverlay'),answerInput=document.getElementById('answerInput'),answerBtn=document.getElementById('answerBtn'),modalCancel=document.getElementById('modalCancel');
var loading=document.getElementById('loadingOverlay'),loadingTimer=document.getElementById('loadingTimer'),loadingSub=document.getElementById('loadingSub');
var dramatic=document.getElementById('dramaticOverlay'),dramaticCounter=document.getElementById('dramaticCounter');
var toast=document.getElementById('resultToast'),toastOverlay=document.getElementById('toastOverlay'),toastIcon=document.getElementById('toastIcon'),toastMsg=document.getElementById('toastMsg'),toastSub=document.getElementById('toastSub');

q.addEventListener('input',function(){go.disabled=q.value.trim()===''});
q.addEventListener('keydown',function(e){if(e.key==='Enter')go.click()});
answerInput.addEventListener('input',function(){var v=this.value.replace(/[^a-eA-E]/g,'').toUpperCase().slice(0,1);if(innocentList.indexOf(v)!==-1)v='';this.value=v});

function resetCaseUI(){caseStep=0;caseDigit=null;chars[0].textContent='?';chars[0].className='case-char waiting';chars[1].textContent='?';chars[1].className='case-char';chars[2].textContent='?';chars[2].className='case-char';chars[3].textContent='?';chars[3].className='case-char';caseError.textContent=''}
function showCase(){activeCase='';history.length=0;activeHit=null;revealedState=null;innocentList=[];wrongCount=0;q.value='';go.disabled=true;identifyBtn.disabled=false;renderHistory();mainScreen.style.display='none';caseScreen.style.display='flex';resetCaseUI();document.addEventListener('keydown',caseKeyHandler);setStatus('READY',false)}
function caseKeyHandler(e){
  if(e.key==='Enter'){caseSubmit.click();return}
  if(e.key==='Backspace'){if(caseDigit!==null){caseDigit=null;chars[3].textContent='?';chars[3].className='case-char'}else if(caseStep>0){caseStep--;chars[caseStep].textContent='?';chars[caseStep].className=caseStep===0?'case-char waiting':'case-char'}caseError.textContent='';return}
  if(caseStep<3){chars[caseStep].textContent=caseLabels[caseStep];chars[caseStep].className='case-char done';caseStep++;chars[caseStep<3?caseStep:3].className='case-char waiting'}
  else if(caseStep===3&&/^[1-5]$/.test(e.key)){caseDigit=e.key;chars[3].textContent=e.key;chars[3].className='case-char locked'}
}
function showMain(c){activeCase=c.toUpperCase();currentCase.textContent='CASE: '+activeCase;caseScreen.style.display='none';mainScreen.style.display='flex';history.length=0;activeHit=null;revealedState=null;innocentList=[];wrongCount=0;q.value='';go.disabled=true;renderHistory();setStatus('READY',false);draw()}
function setStatus(t,proc){statusText.textContent=t;statusBar.className='status-bar'+(proc?' processing':'')}
function renderHistory(){historyList.innerHTML='';if(!history.length){historyList.innerHTML='<div class="history-empty">No searches yet</div>';return}history.forEach(function(v,i){var d=document.createElement('div');d.className='history-item'+(activeHit===v?' active':'');d.innerHTML='<span class="num">#'+(i+1)+'</span><span class="val">'+v+'</span><span>bp</span>';d.onclick=function(){activeHit=v;revealedState=null;innocentList=[];renderHistory();draw()};historyList.appendChild(d)})}
function draw(){
  dna.innerHTML='';
  var thead=document.createElement('thead');var hr=document.createElement('tr');var h0=document.createElement('th');h0.textContent='';hr.appendChild(h0);
  order.forEach(function(id){
    var th=document.createElement('th');
    th.textContent=id;
    if(revealedState){
      if(id===revealedState.guilty)th.className=revealedState.correct?'col-correct':'col-guilty';
      else if(innocentList.indexOf(id)!==-1)th.className='col-innocent';
      else th.className='col-neutral';
    }else if(innocentList.indexOf(id)!==-1){
      th.className='col-innocent';
    }
    hr.appendChild(th)
  });
  thead.appendChild(hr);dna.appendChild(thead);
  var tbody=document.createElement('tbody');
  levels.forEach(function(l){
    var tr=document.createElement('tr');var td0=document.createElement('td');td0.textContent=l;tr.appendChild(td0);
    if(revealedState){
      var hasGuilty=suspects[revealedState.guilty].indexOf(l)!==-1;
      var hasInnocent=false;
      for(var i=0;i<innocentList.length;i++){if(suspects[innocentList[i]].indexOf(l)!==-1){hasInnocent=true;break}}
      if(hasGuilty)td0.className=revealedState.correct?'row-correct':'row-guilty';
      else if(hasInnocent)td0.className='row-innocent';
      else td0.className='row-neutral';
    }else if(innocentList.length){
      for(var i=0;i<innocentList.length;i++){if(suspects[innocentList[i]].indexOf(l)!==-1){td0.className='row-innocent';break}}
    }
    order.forEach(function(id){var td=document.createElement('td');var bar=document.createElement('div');var has=suspects[id].indexOf(l)!==-1;var isHit=activeHit===l&&has;var cls='band-bar';if(has){if(revealedState){if(id===revealedState.guilty)cls+=revealedState.correct?' band-correct':' band-guilty';else if(innocentList.indexOf(id)!==-1)cls+=' band-innocent';else cls+=' band-neutral'}else if(innocentList.length){if(innocentList.indexOf(id)!==-1)cls+=' band-innocent';else{cls+=' on';if(isHit)cls+=' search-hit'}}else{cls+=' on';if(isHit)cls+=' search-hit'}}bar.className=cls;td.appendChild(bar);tr.appendChild(td)});
    tbody.appendChild(tr);
  });dna.appendChild(tbody);
}
function showLoading(callback){
  var duration=2000+Math.random()*2000;
  var msgs=['SCANNING DNA FRAGMENTS...','MATCHING BAND PATTERNS...','CROSS-REFERENCING DATABASE...','ANALYZING GENETIC MARKERS...'];
  loadingSub.textContent=msgs[Math.floor(Math.random()*msgs.length)];loading.classList.add('show');
  var start=Date.now();
  var iv=setInterval(function(){var r=Math.max(0,(duration-(Date.now()-start))/1000);loadingTimer.textContent=r.toFixed(1);if(r<=0){clearInterval(iv);loading.classList.remove('show');callback()}},50);
}
function showDramaticReveal(callback){
  dramaticCounter.textContent='3';dramatic.classList.add('show');
  mainScreen.style.animation='shakeScreen .6s ease-out';
  setTimeout(function(){mainScreen.style.animation=''},600);
  var count=3;
  var iv=setInterval(function(){count--;if(count<=0){clearInterval(iv);dramatic.classList.remove('show');callback()}else{dramaticCounter.textContent=count}},700);
}
function showToast(correct,suspect,sub){
  toast.className='result-toast show '+(correct?'correct':'wrong');toastOverlay.className='toast-overlay show';
  toastIcon.textContent=correct?'\u2714':'\u2718';toastMsg.textContent=correct?'CORRECT':'WRONG';
  toastSub.textContent=sub||(correct?'SUSPECT '+suspect+' IS GUILTY':'SUSPECT '+suspect+' IS INNOCENT');
  setTimeout(function(){toast.className='result-toast';toastOverlay.className='toast-overlay'},2500);
}
function openModal(){answerInput.value='';modalOverlay.classList.add('show');setTimeout(function(){answerInput.focus()},100)}
function closeModal(){modalOverlay.classList.remove('show')}

caseSubmit.onclick=function(){if(caseStep!==3||caseDigit===null){caseError.textContent='ENTER 1-5';return}document.removeEventListener('keydown',caseKeyHandler);showMain('A00'+caseDigit)};
resetBtn.onclick=showCase;
identifyBtn.onclick=function(){if(revealedState)return;openModal()};
modalCancel.onclick=closeModal;
modalOverlay.onclick=function(e){if(e.target===modalOverlay)closeModal()};
go.onclick=function(){
  if(!activeCase){showCase();return}
  if(revealedState){return}
  var v=+q.value;if(!v||levels.indexOf(v)===-1){return}
  if(history.indexOf(v)===-1)history.push(v);
  activeHit=v;revealedState=null;innocentList=[];q.value='';go.disabled=true;renderHistory();setStatus('ANALYZING...',true);dna.classList.add('hidden');
  showLoading(function(){dna.classList.remove('hidden');setStatus('FRAGMENT '+v+'bp ANALYZED',false);draw()});
};
answerBtn.onclick=checkAnswer;
answerInput.onkeydown=function(e){if(e.key==='Enter')checkAnswer();if(e.key==='Escape')closeModal()};
function checkAnswer(){
  if(!activeCase){showCase();return}
  var ans=answerInput.value.trim().toUpperCase();
  if(!/^[A-E]$/.test(ans)||innocentList.indexOf(ans)!==-1){return}
  closeModal();var correct=ans===cases[activeCase];
  if(correct){wrongCount=0;revealedState={guilty:ans,correct:true};go.disabled=true;identifyBtn.disabled=true;showToast(true,ans);draw()}
  else{wrongCount++;innocentList.push(ans);if(wrongCount>=2){showDramaticReveal(function(){revealedState={guilty:cases[activeCase]};go.disabled=true;identifyBtn.disabled=true;draw()})}else{showToast(false,ans,'1 CHANCE REMAINING');draw()}}
}
showCase();
})();
</script></body></html>
