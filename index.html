<!doctype html><html lang='th'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>เครื่องวิเคราะห์ดีเอ็นเอ — เอฟบีไอ</title><style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;user-select:none;font-family:inherit}
button,input,textarea,select{font-family:inherit}
:root{--cyan:#00ffc8;--blue:#0090ff;--purple:#7b61ff;--red:#ff4d6a;--orange:#ff9f1c;--green:#00ff96;--bg:#030810;--border:rgba(0,255,200,.08);--text:#c8e6ff;--muted:#4a7a9a}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans Thai',sans-serif;font-weight:400;font-size:16px;line-height:1.5;min-height:100vh;overflow:hidden;position:fixed;inset:0}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 50%,rgba(0,255,200,.025) 0%,transparent 50%),radial-gradient(ellipse at 85% 20%,rgba(0,144,255,.03) 0%,transparent 50%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,255,200,.005) 3px,rgba(0,255,200,.005) 6px);pointer-events:none;z-index:1;animation:scanlines 10s linear infinite}
@keyframes scanlines{0%{transform:translateY(0)}100%{transform:translateY(6px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{0%{transform:scale(0);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes successBounce{0%{transform:scale(0)}50%{transform:scale(1.2)}70%{transform:scale(.9)}100%{transform:scale(1)}}
@keyframes failShake{0%,100%{transform:translateX(0)}15%{transform:translateX(-10px)}30%{transform:translateX(10px)}45%{transform:translateX(-8px)}60%{transform:translateX(8px)}75%{transform:translateX(-4px)}90%{transform:translateX(4px)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(0,255,200,.15),inset 0 0 20px rgba(0,255,200,.03)}50%{box-shadow:0 0 30px rgba(0,255,200,.25),inset 0 0 30px rgba(0,255,200,.05)}}
@keyframes dotPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.6)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes corePulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:1}50%{transform:translate(-50%,-50%) scale(1.3);opacity:.7}}
@keyframes timerGlow{0%,100%{text-shadow:0 0 30px rgba(0,255,200,.4)}50%{text-shadow:0 0 50px rgba(0,255,200,.7)}}
@keyframes hitPulse{0%,100%{box-shadow:0 0 24px rgba(255,159,28,.6);transform:scaleY(1)}50%{box-shadow:0 0 36px rgba(255,159,28,.9);transform:scaleY(1.15)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}

/* Case Screen */
#caseScreen{position:absolute;z-index:300;display:flex;align-items:center;justify-content:center;inset:0;background:var(--bg)}
.case-box{text-align:center;padding:48px 44px;background:linear-gradient(160deg,rgba(10,22,40,.95) 0%,rgba(5,10,20,.98) 100%);border:1px solid var(--border);border-radius:24px;width:92%;max-width:480px;box-shadow:0 0 80px rgba(0,255,200,.04),0 0 160px rgba(0,144,255,.03);backdrop-filter:blur(24px);animation:boxIn .7s ease-out}
@keyframes boxIn{from{opacity:0;transform:translateY(40px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.case-box .logo{width:90px;height:90px;margin:0 auto 24px}
.case-box .logo svg{width:100%;height:100%;filter:drop-shadow(0 0 20px rgba(0,255,200,.3))}
.case-box h1{font-size:28px;font-weight:700;letter-spacing:4px;background:linear-gradient(135deg,var(--cyan),var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;animation:fadeUp .6s ease-out .5s both}
.case-box .sub{color:var(--muted);font-size:14px;font-weight:500;letter-spacing:4px;text-transform:uppercase;margin-bottom:32px;animation:fadeUp .6s ease-out .6s both}
.case-box .case-visual{display:flex;gap:10px;justify-content:center;margin-bottom:24px;animation:fadeUp .6s ease-out .7s both}
.case-box .case-char{width:64px;height:76px;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:700;letter-spacing:2px;border:2px solid rgba(0,255,200,.12);border-radius:14px;background:rgba(0,8,16,.8);color:var(--cyan);transition:all .35s cubic-bezier(.4,0,.2,1)}
.case-box .case-char.waiting{border-color:var(--cyan);box-shadow:0 0 20px rgba(0,255,200,.15),inset 0 0 20px rgba(0,255,200,.03);animation:glow 2s ease-in-out infinite}
.case-box .case-char.done{border-color:rgba(0,255,200,.3);background:rgba(0,255,200,.04);color:var(--cyan);animation:popIn .3s ease-out}
.case-box .case-char.locked{border-color:var(--green);background:rgba(0,255,150,.06);color:var(--green);box-shadow:0 0 16px rgba(0,255,150,.15);animation:popIn .3s ease-out}
.case-box .error{color:var(--red);font-size:15px;min-height:24px;margin-top:14px;font-weight:500;letter-spacing:1px}
.case-box .btn{margin-top:8px}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 28px;font-size:18px;font-weight:600;letter-spacing:2px;border:none;border-radius:12px;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);text-transform:uppercase;position:relative;overflow:hidden}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.btn-primary{background:linear-gradient(135deg,var(--cyan),var(--blue));color:var(--bg);box-shadow:0 4px 24px rgba(0,255,200,.25)}
.btn-primary:hover:not(:disabled){box-shadow:0 8px 40px rgba(0,255,200,.4);transform:translateY(-2px)}
.btn-ghost{background:transparent;border:1px solid rgba(0,255,200,.2);color:var(--cyan)}
.btn-ghost:hover{background:rgba(0,255,200,.06);border-color:rgba(0,255,200,.4)}
.btn-sm{padding:8px 16px;font-size:16px;font-weight:600;letter-spacing:1.5px}
.btn-danger{background:linear-gradient(135deg,var(--red),#e03050);color:#fff;box-shadow:0 4px 20px rgba(255,77,106,.2)}
.btn-danger:hover:not(:disabled){box-shadow:0 8px 32px rgba(255,77,106,.35);transform:translateY(-2px)}
.btn-warning{background:linear-gradient(135deg,var(--orange),#e08800);color:var(--bg);box-shadow:0 4px 20px rgba(255,159,28,.2)}
.btn-warning:hover:not(:disabled){box-shadow:0 8px 32px rgba(255,159,28,.35);transform:translateY(-2px)}

/* Desktop */
#desktop{position:absolute;inset:0;z-index:5;display:none;background:
  radial-gradient(ellipse at 20% 40%,rgba(0,144,255,.05) 0%,transparent 55%),
  radial-gradient(ellipse at 80% 30%,rgba(0,255,200,.04) 0%,transparent 55%),
  radial-gradient(ellipse at 50% 80%,rgba(123,97,255,.03) 0%,transparent 50%),
  var(--bg)}
#desktop.show{display:block}
#desktop::before{content:'';position:absolute;inset:0;background:
  repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(0,255,200,.012) 40px,rgba(0,255,200,.012) 41px),
  repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(0,255,200,.012) 40px,rgba(0,255,200,.012) 41px);
  pointer-events:none;z-index:0}
#desktop::after{content:'FBI DNA ANALYZER';position:absolute;bottom:60px;right:30px;
  font-size:11px;letter-spacing:6px;
  color:rgba(0,255,200,.06);pointer-events:none;z-index:0}
#caseBadge{position:fixed;top:14px;right:16px;z-index:10;
  font-size:14px;font-weight:600;letter-spacing:3px;
  color:var(--cyan);background:rgba(0,255,200,.06);border:1px solid rgba(0,255,200,.1);
  padding:8px 16px;border-radius:8px;pointer-events:none;box-shadow:0 0 20px rgba(0,255,200,.08)}
#desktopIcons{position:absolute;top:20px;left:20px;display:flex;flex-direction:column;gap:24px;z-index:2}
.desk-icon{display:flex;flex-direction:column;align-items:center;gap:6px;width:90px;padding:10px 8px;border-radius:10px;cursor:pointer;transition:.2s;text-align:center}
.desk-icon:hover{background:rgba(0,255,200,.08);transform:translateY(-3px)}
.desk-icon:active{transform:scale(.92)}
.desk-icon .ico{width:54px;height:54px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;background:linear-gradient(135deg,rgba(0,255,200,.1),rgba(0,144,255,.05));border:1px solid rgba(0,255,200,.12);box-shadow:0 4px 20px rgba(0,0,0,.4),0 0 20px rgba(0,255,200,.02);transition:.3s}
.desk-icon:hover .ico{border-color:rgba(0,255,200,.25);box-shadow:0 6px 28px rgba(0,0,0,.5),0 0 30px rgba(0,255,200,.06);transform:translateY(-2px)}
.desk-icon.dna .ico{background:linear-gradient(135deg,rgba(0,255,200,.15),rgba(0,144,255,.08));border-color:rgba(0,255,200,.2)}
.desk-icon.search .ico{background:linear-gradient(135deg,rgba(255,159,28,.12),rgba(255,77,106,.06));border-color:rgba(255,159,28,.15)}
.desk-icon.suspects .ico{background:linear-gradient(135deg,rgba(123,97,255,.12),rgba(0,144,255,.06));border-color:rgba(123,97,255,.15)}
.desk-icon .lbl{font-size:13px;font-weight:500;letter-spacing:1.5px;color:var(--muted);line-height:1.3;word-break:break-word}

/* Taskbar */
#taskbar{position:fixed;bottom:0;left:0;right:0;height:44px;background:rgba(5,10,20,.95);border-top:1px solid var(--border);backdrop-filter:blur(16px);z-index:250;display:flex;align-items:center;padding:0 12px;gap:6px}
#taskbar .task-clock{font-size:13px;color:var(--muted);margin-left:auto;letter-spacing:2px;padding:0 10px}
.task-btn{display:flex;align-items:center;gap:8px;padding:6px 14px;font-size:13px;font-weight:500;letter-spacing:1.5px;color:var(--muted);background:rgba(0,255,200,.02);border:1px solid transparent;border-radius:8px;cursor:pointer;transition:.2s;height:34px}
.task-btn:hover{background:rgba(0,255,200,.06);color:var(--text)}
.task-btn.active{background:rgba(0,255,200,.08);border-color:rgba(0,255,200,.12);color:var(--cyan)}
.task-btn .dot{width:6px;height:6px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan)}

/* Windows */
.window{position:absolute;border:1px solid rgba(0,255,200,.06);border-radius:14px;
  background:linear-gradient(170deg,rgba(8,18,34,.98),rgba(4,8,16,.99));
  box-shadow:0 8px 48px rgba(0,0,0,.5),0 0 80px rgba(0,255,200,.015),inset 0 1px 0 rgba(0,255,200,.04);
  backdrop-filter:blur(20px);display:none;overflow:hidden;min-width:320px;min-height:200px}
.window.show{display:flex;flex-direction:column;animation:winOpen .3s cubic-bezier(.175,.885,.32,1.1)}
@keyframes winOpen{from{opacity:0;transform:scale(.88) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.window.maximized{border-radius:0;border:none;inset:0!important;width:100%!important;height:calc(100% - 44px)!important}
.win-header{display:flex;align-items:center;padding:10px 14px;background:rgba(0,255,200,.02);border-bottom:1px solid rgba(0,255,200,.04);cursor:default;flex-shrink:0}
.win-header:active{cursor:grabbing}
.win-dot{width:10px;height:10px;border-radius:50%;margin-right:10px;flex-shrink:0}
.win-dot.dna{background:linear-gradient(135deg,var(--cyan),var(--blue));box-shadow:0 0 10px rgba(0,255,200,.3)}
.win-dot.search{background:linear-gradient(135deg,var(--orange),#e08800);box-shadow:0 0 10px rgba(255,159,28,.3)}
.win-dot.suspects{background:linear-gradient(135deg,var(--purple),var(--blue));box-shadow:0 0 10px rgba(123,97,255,.3)}
.win-title{flex:1;font-size:14px;font-weight:600;letter-spacing:2.5px;color:var(--cyan)}
.win-controls{display:flex;gap:6px}
.win-controls button{width:28px;height:28px;border:none;border-radius:6px;background:rgba(255,255,255,.03);color:var(--muted);font-size:14px;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center}
.win-controls button:hover{background:rgba(255,255,255,.08);color:var(--text)}
.win-controls .win-close:hover{background:var(--red);color:#fff}
.win-body{flex:1;overflow:auto;padding:16px;position:relative}
.win-body::-webkit-scrollbar{width:4px}
.win-body::-webkit-scrollbar-track{background:rgba(0,255,200,.02)}
.win-body::-webkit-scrollbar-thumb{background:rgba(0,255,200,.1);border-radius:2px}
.win-resize{position:absolute;bottom:0;right:0;width:16px;height:16px;cursor:nwse-resize;z-index:10}
.win-resize::after{content:'';position:absolute;bottom:4px;right:4px;width:8px;height:8px;border-right:2px solid rgba(0,255,200,.15);border-bottom:2px solid rgba(0,255,200,.15)}

/* DNA Table (Program 1) */
.dna-table{width:100%;border-collapse:separate;border-spacing:0;transition:opacity .3s}
.dna-table.hidden{opacity:0;pointer-events:none}
.dna-table th,.dna-table td{padding:10px 8px;text-align:center;vertical-align:middle}
.dna-table th{border-bottom:1px solid rgba(0,255,200,.08);font-size:22px;font-weight:700;color:var(--muted);letter-spacing:2px}
.dna-table th:first-child{font-size:12px;font-weight:600;color:var(--muted);text-align:right;padding-right:16px;width:70px;white-space:nowrap;letter-spacing:1px}
.dna-table td{border-bottom:1px solid rgba(0,255,200,.04)}
.dna-table td:first-child{font-size:15px;color:var(--muted);text-align:right;padding-right:16px;width:70px;white-space:nowrap}
.dna-table tr:last-child td{border-bottom:none}
.band-bar{height:12px;border-radius:6px;background:rgba(0,255,200,.03);position:relative;min-width:40px;transition:all .3s cubic-bezier(.4,0,.2,1)}
.band-bar.on{background:linear-gradient(90deg,var(--cyan),var(--blue));box-shadow:0 0 16px rgba(0,255,200,.3);height:14px}
.band-bar.on::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.25),transparent);border-radius:6px}
.band-bar.search-hit{background:linear-gradient(90deg,var(--orange),#ff6b00) !important;box-shadow:0 0 20px rgba(255,159,28,.5) !important;height:16px;animation:hitPulse 1.2s ease-in-out infinite}
.dna-table td.col-guilty .band-bar.on{background:linear-gradient(90deg,var(--red),#ff2040);box-shadow:0 0 16px rgba(255,77,106,.5)}
.dna-table td.col-innocent .band-bar.on{background:linear-gradient(90deg,var(--green),#00cc70);box-shadow:0 0 16px rgba(0,255,150,.5)}
.dna-table td.col-correct .band-bar.on{background:linear-gradient(90deg,var(--orange),#ff8800);box-shadow:0 0 20px rgba(255,159,28,.5)}
.dna-table td.col-neutral .band-bar.on{opacity:.2}
.band-bar.band-guilty{background:linear-gradient(90deg,var(--red),#ff2040);box-shadow:0 0 16px rgba(255,77,106,.5);height:16px}
.band-bar.band-guilty::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.2),transparent);border-radius:6px}
.band-bar.band-innocent{background:linear-gradient(90deg,var(--green),#00cc70);box-shadow:0 0 16px rgba(0,255,150,.5);height:16px}
.band-bar.band-innocent::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.2),transparent);border-radius:6px}
.band-bar.band-correct{background:linear-gradient(90deg,var(--orange),#ff8800);box-shadow:0 0 20px rgba(255,159,28,.5);height:16px}
.band-bar.band-correct::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.2),transparent);border-radius:6px}
.band-bar.band-neutral{opacity:.12}
.band-bar.band-marked{background:linear-gradient(90deg,var(--orange),#ffcc00) !important;box-shadow:0 0 20px rgba(255,159,28,.6) !important;height:16px}

/* Column tint colors for Program 1 (no labels, shuffled) */
.dna-table td.col-t0 .band-bar.on{background:linear-gradient(90deg,#00ffc8,#0090ff)}
.dna-table td.col-t1 .band-bar.on{background:linear-gradient(90deg,#00e8b0,#0080e0)}
.dna-table td.col-t2 .band-bar.on{background:linear-gradient(90deg,#00d4a0,#0070cc)}
.dna-table td.col-t3 .band-bar.on{background:linear-gradient(90deg,#00c090,#0060b8)}
.dna-table td.col-t4 .band-bar.on{background:linear-gradient(90deg,#00b080,#0050a4)}
.dna-table td.row-guilty{color:var(--red);font-weight:600}
.dna-table td.row-innocent{color:var(--green);font-weight:600}
.dna-table td.row-correct{color:var(--orange);font-weight:600}
.dna-table td.row-neutral{color:#1a3a4a}

/* Search Program */
.search-box{position:relative;margin-bottom:12px}
.search-box input{width:100%;padding:16px 18px 16px 46px;font-size:22px;font-weight:500;letter-spacing:2px;border:1px solid rgba(0,255,200,.1);border-radius:10px;background:rgba(0,8,16,.6);color:var(--cyan);outline:none;transition:.3s}
.search-box input::placeholder{color:#1e4a5a;font-size:17px;font-weight:400;letter-spacing:1px}
.search-box input:focus{border-color:rgba(0,255,200,.3);box-shadow:0 0 20px rgba(0,255,200,.06),inset 0 0 20px rgba(0,255,200,.02)}
.search-box svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:#1e4a5a;transition:.3s}
.search-box input:focus+svg{color:var(--cyan)}
.search-actions{display:flex;gap:8px;margin-bottom:16px}
.section-label{font-size:12px;font-weight:600;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}
.history-list{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;max-height:150px;overflow-y:auto;padding-right:4px}
.history-list::-webkit-scrollbar{width:3px}
.history-list::-webkit-scrollbar-track{background:rgba(0,255,200,.02)}
.history-list::-webkit-scrollbar-thumb{background:rgba(0,255,200,.1);border-radius:2px}
.history-item{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(0,255,200,.02);border:1px solid rgba(0,255,200,.04);border-radius:8px;font-size:15px;font-weight:500;letter-spacing:1px;color:var(--muted);transition:all .25s;cursor:pointer}
.history-item:hover{border-color:rgba(0,255,200,.1);color:var(--text);background:rgba(0,255,200,.04);transform:translateX(3px)}
.history-item.active{border-color:var(--orange);color:var(--orange);background:rgba(255,159,28,.04);box-shadow:0 0 12px rgba(255,159,28,.06)}
.history-item .val{color:var(--cyan);font-weight:600;font-size:15px;letter-spacing:1px}
.history-item .num{color:#1e4a5a;font-size:9px;min-width:24px}
.history-empty{font-size:13px;color:#1a3a4a;font-style:italic;text-align:center;padding:12px;letter-spacing:1px}
.status-bar{display:flex;align-items:center;gap:8px;padding:12px 16px;border-radius:8px;font-size:14px;font-weight:500;letter-spacing:2px;color:var(--muted);background:rgba(0,255,200,.02);border:1px solid rgba(0,255,200,.04);transition:.3s}
.status-bar.processing{color:var(--cyan);border-color:rgba(0,255,200,.1);animation:statusPulse 2s ease-in-out infinite}
@keyframes statusPulse{0%,100%{opacity:1}50%{opacity:.6}}
.status-bar .dot{width:6px;height:6px;border-radius:50%;background:#1a3a4a;transition:.3s;flex-shrink:0}
.status-bar.processing .dot{background:var(--cyan);box-shadow:0 0 8px var(--cyan);animation:dotPulse 1.2s ease-in-out infinite}

/* Suspect Profiles (Program 3) */
.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:4px}
@media(max-width:500px){.profile-grid{grid-template-columns:1fr}}
.profile-card{padding:14px;border-radius:10px;border:1px solid rgba(0,255,200,.06);background:rgba(0,255,200,.015);cursor:pointer;transition:.25s}
.profile-card.selected{border-color:var(--orange);box-shadow:0 0 24px rgba(255,159,28,.4),inset 0 0 20px rgba(255,159,28,.08);background:rgba(255,159,28,.08);transform:translateY(-3px)}
.profile-card.selected .pbadge{background:linear-gradient(135deg,var(--orange),#e08800);box-shadow:0 0 20px rgba(255,159,28,.5)}
.profile-card:hover{border-color:rgba(0,255,200,.14);background:rgba(0,255,200,.03);transform:translateY(-2px)}
.profile-card .phead{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.profile-card .pbadge{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:var(--bg);background:linear-gradient(135deg,var(--cyan),var(--blue));flex-shrink:0;box-shadow:0 0 16px rgba(0,255,200,.15)}
.profile-card .pname{font-size:13px;font-weight:600;color:var(--cyan);letter-spacing:2px}
.profile-card .pcount{font-size:11px;font-weight:500;color:var(--muted);margin-left:auto;letter-spacing:1px}
.profile-card .pbands{display:flex;flex-direction:column;gap:4px}
.profile-card .pband{display:flex;align-items:center;gap:8px}

var winDefaults={dna:{x:60,y:60,w:620,h:460},search:{x:90,y:90,w:460,h:380},suspects:{x:120,y:120,w:540,h:440}};
var wins={dna:{el:document.getElementById('win-dna'),open:false,x:60,y:60,w:620,h:460,min:false,max:false,z:100},
search:{el:document.getElementById('win-search'),open:false,x:90,y:90,w:460,h:380,min:false,max:false,z:101},

var maxZ=102;

function saveLayout(){
  var data={};
  Object.keys(wins).forEach(function(id){
    var w=wins[id];
    if(w.open)data[id]={x:w.x,y:w.y,w:w.w,h:w.h,open:true,min:w.min,max:w.max,z:w.z};
  });
  try{localStorage.setItem('dnaLayout',JSON.stringify(data))}catch(e){}
}
function loadLayout(){
  try{
    var raw=localStorage.getItem('dnaLayout');
    if(!raw)return;
    var data=JSON.parse(raw);
    Object.keys(wins).forEach(function(id){
      if(data[id]){
        var d=data[id],w=wins[id];
        w.x=d.x;w.y=d.y;w.w=d.w;w.h=d.h;w.open=d.open;w.min=d.min;w.max=d.max;w.z=d.z;
      }
    });
  }catch(e){}
}

function openWin(id){
  var w=wins[id];if(!w||w.open)return;
  w.open=true;maxZ++;w.z=maxZ;
  w.el.style.left=w.x+'px';w.el.style.top=w.y+'px';w.el.style.width=w.w+'px';w.el.style.height=w.h+'px';
  w.el.style.zIndex=w.z;w.el.classList.add('show');
  if(id==='dna')draw();
  if(id==='suspects')renderProfiles();
  renderTaskbar();saveLayout();
}

function closeWin(id){
  var w=wins[id];if(!w||!w.open)return;
  w.open=false;w.min=false;w.el.classList.remove('show','maximized');
  var d=winDefaults[id];if(d){w.x=d.x;w.y=d.y;w.w=d.w;w.h=d.h}
  renderTaskbar();saveLayout();
}

function toggleMin(id){
  var w=wins[id];if(!w||!w.open)return;
  w.min=!w.min;w.el.style.display=w.min?'none':'flex';
  renderTaskbar();
}

function toggleMax(id){
  var w=wins[id];if(!w||!w.open)return;
  w.max=!w.max;
  if(w.max){w.el.classList.add('maximized')}
  else{w.el.classList.remove('maximized');w.el.style.left=w.x+'px';w.el.style.top=w.y+'px';w.el.style.width=w.w+'px';w.el.style.height=w.h+'px'}
}

function focusWin(id){
  var w=wins[id];if(!w||!w.open||w.min)return;
  maxZ++;w.z=maxZ;w.el.style.zIndex=w.z;renderTaskbar();
}

// Taskbar

// Window controls
Object.keys(wins).forEach(function(id){

  document.addEventListener('mousemove',function(e){

    var nx=e.clientX-dx,ny=e.clientY-dy;
    nx=Math.max(0,Math.min(nx,window.innerWidth-200));
    ny=Math.max(0,Math.min(ny,window.innerHeight-44-100));

  });
  document.addEventListener('mouseup',function(){if(drg){drg=false;saveLayout()}});
  // Resize
  var rx,ry,rw,rh,r=false;
  resize.addEventListener('mousedown',function(e){
    e.stopPropagation();if(w.max)return;
    r=true;rx=e.clientX;ry=e.clientY;rw=w.el.offsetWidth;rh=w.el.offsetHeight;
  });
  document.addEventListener('mousemove',function(e){
    if(!r)return;
    var nw=Math.max(320,rw+e.clientX-rx),nh=Math.max(200,rh+e.clientY-ry);
    w.w=nw;w.h=nh;w.el.style.width=nw+'px';w.el.style.height=nh+'px';
  });
  document.addEventListener('mouseup',function(){if(r){r=false;saveLayout()}});
});

// === PROGRAM 1: DNA Fingerprint (shuffled, no headers) ===
function shuffleArray(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}
var markedRows=[];

function draw(){
  dna.innerHTML='';
  var thead=document.createElement('thead');
  var hRow=document.createElement('tr');
  var hFirst=document.createElement('th');hFirst.textContent='???';hRow.appendChild(hFirst);
  shuffledOrder.forEach(function(id,idx){
    var th=document.createElement('th');
    var identified=identifiedCols[idx];
    th.textContent=identified||'?';
    if(identified)th.style.color='var(--cyan)';
    if(!revealedState&&selectedSuspect){
      th.style.cursor='pointer';
      th.onclick=function(){tryLinkSuspect(idx,th)};
    }
    hRow.appendChild(th);
  });
  thead.appendChild(hRow);dna.appendChild(thead);
  var tbody=document.createElement('tbody');
  levels.forEach(function(l){
    var tr=document.createElement('tr');var td0=document.createElement('td');td0.textContent=revealedState||history.indexOf(l)!==-1?l:'?';tr.appendChild(td0);
    if(markedRows.indexOf(l)!==-1&&!revealedState){td0.style.color='var(--orange)';td0.style.fontWeight='800'}
    if(revealedState){
      var hasGuilty=suspects[revealedState.guilty].indexOf(l)!==-1;
      var hasInnocent=false;
      for(var i=0;i<innocentList.length;i++){if(suspects[innocentList[i]].indexOf(l)!==-1){hasInnocent=true;break}}
      if(hasGuilty)td0.className=revealedState.correct?'row-correct':'row-guilty';
      else if(hasInnocent)td0.className='row-innocent';
      else td0.className='row-neutral';
    }else if(innocentList.length){
      for(var i=0;i<innocentList.length;i++){if(suspects[innocentList[i]].indexOf(l)!==-1){td0.className='row-innocent';break}}
    }
    shuffledOrder.forEach(function(id,idx){
      var td=document.createElement('td');var bar=document.createElement('div');
      var has=suspects[id].indexOf(l)!==-1;var isHit=activeHit===l&&has;
      var cls='band-bar';
      if(has){
        if(revealedState){
          if(id===revealedState.guilty)cls+=revealedState.correct?' band-correct':' band-guilty';
          else if(innocentList.indexOf(id)!==-1)cls+=' band-innocent';
          else cls+=' band-neutral';
        }else if(innocentList.length){
          if(innocentList.indexOf(id)!==-1)cls+=' band-innocent';
          else{cls+=' on'}
        }else{
          td.className='col-t'+idx;cls+=' on';
        }
      }
      if(markedRows.indexOf(l)!==-1&&has&&!revealedState)cls+=' band-marked';
      bar.className=cls;td.appendChild(bar);tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });dna.appendChild(tbody);
}

// === LINKING LOGIC ===
function tryLinkSuspect(idx,thEl){
  if(!selectedSuspect||revealedState)return;
  var sid=shuffledOrder[idx];
  var picked=selectedSuspect;
  var correct=picked===sid;
  var fromEl=document.querySelector('#suspectDetail .dbadge')||document.querySelector('#win-suspects');
  var fromRect=fromEl?fromEl.getBoundingClientRect():null;
  var toRect=thEl?thEl.getBoundingClientRect():null;
  selectedSuspect=null;
  draw();renderProfiles();
  animateBeamRect(fromRect,toRect,correct?'#00ff96':'#ff4d6a',function(){
    if(correct){
      identifiedCols[idx]=picked;
      draw();renderProfiles();
      setStatus('✔ เชื่อม '+picked+' → '+__(caseL)+activeCase,false);
      showToast(true,picked,'✔ เชื่อมถูกต้อง — '+sid);
    }
  });
}

function animateBeamRect(fromRect,toRect,resultColor,callback,onArrive){
  if(!fromRect||!toRect||!fromRect.width||!toRect.width){if(callback)callback();return}
  var grayColor='#4a7a9a';
  var x1=fromRect.left+fromRect.width/2,y1=fromRect.top+fromRect.height/2;
  var x2=toRect.left+toRect.width/2,y2=toRect.top+toRect.height/2;
  var topY=Math.min(y1,y2)-60;
  var pathD='M '+x1+' '+y1+' L '+x1+' '+topY+' L '+x2+' '+topY+' L '+x2+' '+y2;
  var beam=document.createElement('div');
  beam.id='linkBeam';
  var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.style.cssText='width:100%;height:100%;position:absolute;top:0;left:0';
  var path=document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d',pathD);
  path.style.stroke=grayColor;
  path.setAttribute('stroke-width','4');
  path.setAttribute('fill','none');
  path.setAttribute('stroke-linecap','round');
  path.setAttribute('stroke-linejoin','round');
  path.setAttribute('opacity','0.8');
  svg.appendChild(path);beam.appendChild(svg);document.body.appendChild(beam);
  var totalLen=path.getTotalLength();
  path.setAttribute('stroke-dasharray',totalLen);
  path.setAttribute('stroke-dashoffset',totalLen);
  var T=1400;
  var start=null;
  function step(ts){
    if(!start)start=ts;
    var p=Math.min(1,(ts-start)/T);
    var drawn=totalLen*p;
    path.setAttribute('stroke-dashoffset',totalLen-drawn);
    if(p<1){
      requestAnimationFrame(step);
    }else{
      if(typeof onArrive==='function')onArrive();
      path.style.stroke=resultColor;
      path.setAttribute('stroke-width','6');
      path.setAttribute('opacity','1');
      setTimeout(function(){
        beam.style.transition='opacity .5s';
        beam.style.opacity='0';
        setTimeout(function(){beam.remove();if(callback)callback()},500);
      },400);
    }
  }
  requestAnimationFrame(step);
}

// === PROGRAM 2: Search ===
q.addEventListener('input',function(){go.disabled=q.value.trim()===''});
q.addEventListener('keydown',function(e){if(e.key==='Enter')go.click()});

function setStatus(t,proc){statusText.textContent=t;statusBar.className='status-bar'+(proc?' processing':'')}
function renderHistory(){historyList.innerHTML='';if(!history.length){historyList.innerHTML='<div class="history-empty">'+__('noSearch')+'</div>';return}history.forEach(function(v,i){var d=document.createElement('div');d.className='history-item'+(activeHit===v?' active':'');d.innerHTML='<span class="num">#'+(i+1)+'</span><span class="val">'+v+'</span><span>bp</span>';d.onclick=function(){activeHit=v;revealedState=null;renderHistory();draw();renderProfiles();setTimeout(function(){var rows=document.querySelectorAll('#dna tbody tr');rows.forEach(function(r){var c=r.children[0];if(c&&c.textContent.trim()==v+''){for(var j=1;j<r.children.length;j++){var b=r.children[j].querySelector('.band-bar.on');if(b&&!b.classList.contains('band-innocent'))b.classList.add('search-hit')}}})},50)};historyList.appendChild(d)})}

go.onclick=function(){
  if(!activeCase){showCase();return}
  if(revealedState){return}
  var v=+q.value;if(!v||levels.indexOf(v)===-1){return}
  if(history.indexOf(v)===-1)history.push(v);
  activeHit=v;revealedState=null;q.value='';go.disabled=true;renderHistory();setStatus(__('frag',v),false);
  if(!wins.dna.open)openWin('dna');
  draw();renderProfiles();
  setTimeout(function(){
    var fromEl=document.getElementById('go');
    var rows=document.querySelectorAll('#dna tbody tr');
    var targetRow=null;
    var targetCells=[];
    rows.forEach(function(r){
      var c=r.children[0];
      if(c&&c.textContent.trim()==v+''){
        targetRow=r;
        for(var i=1;i<r.children.length;i++){
          var bar=r.children[i].querySelector('.band-bar.on,.band-bar.search-hit');
          if(bar)targetCells.push(r.children[i]);
        }
      }
    });
    if(fromEl&&targetCells.length){
      var fromRect=fromEl.getBoundingClientRect();
      targetCells.forEach(function(cell,i){
        setTimeout(function(){
          var toRect=cell.getBoundingClientRect();

          animateBeamRect(fromRect,toRect,'#ff9f1c',function(){},function(){
            if(bar){bar.classList.add('search-hit');bar.style.animation='hitPulse 1.2s ease-in-out infinite'}
          });
        },i*200);
      });
    }
  },100);
};

answerBtn.onclick=checkAnswer;

// === PROGRAM 3: Suspect Profiles ===
function renderProfiles(){
  if(suspectDetail.classList.contains('show')){var sid=suspectDetail.querySelector('.dbadge').textContent;suspectDetail.querySelectorAll('.dband').forEach(function(b){var bv=b.querySelector('.dbar-fill');['bar-guilty','bar-innocent','bar-correct'].forEach(function(c){bv.classList.remove(c)});var sc='';if(revealedState){if(revealedState.guilty===sid)sc=revealedState.correct?'bar-correct':'bar-guilty'}else if(innocentList.indexOf(sid)!==-1)sc='bar-innocent';if(sc)bv.classList.add(sc)});return}
  suspectDetail.classList.remove('show');suspectDetail.style.display='none';
  suspectsList.style.display='grid';suspectsList.innerHTML='';
  order.forEach(function(id){
    var bands=suspects[id];
    var statusClass = '';
    if(revealedState){if(revealedState.guilty===id)statusClass=revealedState.correct?'correct':'guilty';}else if(innocentList.indexOf(id)!==-1)statusClass='innocent';
    var card=document.createElement('div');card.className='profile-card'+(statusClass?' '+statusClass:'');
    card.innerHTML='<div class="phead"><div class="pbadge">'+id+'</div><span class="pname">'+__('sus')+' '+id+'</span><span class="pcount">'+bands.length+' '+__('bands')+'</span></div><div class="pbands">'+
      levels.map(function(l){var has=bands.indexOf(l)!==-1;var barClass='pbar'+(statusClass?' bar-'+statusClass:'');return '<div class="pband"><span class="plbl">'+(has?l:'')+'</span><div class="'+barClass+'" style="width:'+(has?'100':'0')+'%;height:'+(has?'8':'0')+'px"></div></div>'}).join('')+'</div>';
    card.onclick=function(){showSuspectDetail(id)};
    card.ondblclick=function(){showSuspectDetail(id)};
    suspectsList.appendChild(card);
  });
}

function showSuspectDetail(id){
  var bands=suspects[id];
  suspectsList.style.display='none';
  suspectDetail.style.display='block';suspectDetail.classList.add('show');
  var maxL=Math.max.apply(null,levels);
  var statusClass='';if(revealedState){if(revealedState.guilty===id)statusClass=revealedState.correct?'correct':'guilty';}else if(innocentList.indexOf(id)!==-1)statusClass='innocent';
  suspectDetail.innerHTML='<div class="dhead"><button class="back" id="detailBack">'+__('back')+'</button><div class="dbadge">'+id+'</div><span class="dtitle">'+__('sus')+' '+id+__('profile')+'</span><button class="btn btn-ghost btn-sm" id="connectBtn" style="margin-left:auto;font-size:12px;letter-spacing:1px">เชื่อมข้อมูล</button></div><div class="dbands">'+
    levels.map(function(l){var has=bands.indexOf(l)!==-1;var barClass='dbar-fill'+(statusClass?' bar-'+statusClass:'');return '<div class="dband"><span class="dlbl">'+l+'</span><div class="dbar-wrap"><div class="'+barClass+'" style="width:'+(has?'100':'0')+'%"></div></div><span class="dval">'+(has?__('yes'):__('no'))+'</span></div>'}).join('')+'</div>';
  document.getElementById('detailBack').onclick=function(){suspectDetail.classList.remove('show');suspectDetail.style.display='none';suspectsList.style.display='grid';renderProfiles()};
  document.getElementById('connectBtn').onclick=function(){
    selectedSuspect=id;
    focusWin('dna');
    draw();
  };
}

// === GAME LOGIC ===
function resetCaseUI(){caseStep=0;caseDigit=null;chars[0].textContent='?';chars[0].className='case-char waiting';chars[1].textContent='?';chars[1].className='case-char';chars[2].textContent='?';chars[2].className='case-char';chars[3].textContent='?';chars[3].className='case-char';caseError.textContent=''}
function showCase(){activeCase='';history.length=0;activeHit=null;revealedState=null;innocentList=[];wrongCount=0;identifiedCols={};selectedSuspect=null;q.value='';go.disabled=true;identifyBtn.disabled=false;renderHistory();setStatus(__('ready'),false);desktop.classList.remove('show');caseScreen.style.display='flex';caseBadge.textContent='';resetCaseUI();document.addEventListener('keydown',caseKeyHandler)}
function caseKeyHandler(e){
  if(e.key==='Enter'){caseSubmit.click();return}
  if(e.key==='Backspace'){if(caseDigit!==null){caseDigit=null;chars[3].textContent='?';chars[3].className='case-char'}else if(caseStep>0){caseStep--;chars[caseStep].textContent='?';chars[caseStep].className=caseStep===0?'case-char waiting':'case-char'}caseError.textContent='';return}
  if(caseStep<3){chars[caseStep].textContent=['A','0','0'][caseStep];chars[caseStep].className='case-char done';caseStep++;chars[caseStep<3?caseStep:3].className='case-char waiting'}
  else if(caseStep===3&&validSuffixes.indexOf(e.key)!==-1){caseDigit=e.key;chars[3].textContent=e.key;chars[3].className='case-char locked'}
}
caseSubmit.onclick=function(){if(caseStep!==3||caseDigit===null){caseError.textContent=__('errEnter')+validSuffixes.join('/');return}document.removeEventListener('keydown',caseKeyHandler);showMain('A00'+caseDigit)};

function showMain(c){
  activeCase=c.toUpperCase();caseScreen.style.display='none';desktop.classList.add('show');
  caseBadge.textContent=__('caseL')+activeCase;
  history.length=0;activeHit=null;revealedState=null;innocentList=[];wrongCount=0;identifiedCols={};selectedSuspect=null;
  shuffledOrder=order.slice();shuffleArray(shuffledOrder);
  q.value='';go.disabled=true;identifyBtn.disabled=false;renderHistory();setStatus(__('ready'),false);
  loadLayout();maxZ=102;
  Object.keys(wins).forEach(function(id){
    if(wins[id].z>maxZ)maxZ=wins[id].z;
    var w=wins[id];
    if(w.open){
      w.el.style.left=w.x+'px';w.el.style.top=w.y+'px';w.el.style.width=w.w+'px';w.el.style.height=w.h+'px';
      w.el.style.zIndex=w.z;w.el.classList.add('show');
      if(w.min)w.el.style.display='none';
      if(w.max)w.el.classList.add('maximized');
    }
  });
  if(wins.dna.open)draw();
  if(wins.suspects.open)renderProfiles();
  renderTaskbar();
}
function openModal(){answerInput.value='';modalOverlay.classList.add('show');setTimeout(function(){answerInput.focus()},100)}
function closeModal(){modalOverlay.classList.remove('show')}
modalCancel.onclick=closeModal;
modalOverlay.onclick=function(e){if(e.target===modalOverlay)closeModal()};
function showResetConfirm(){
  var confirmOverlay=document.createElement('div');
  confirmOverlay.className='modal-overlay show';
  confirmOverlay.style.zIndex='550';
  confirmOverlay.innerHTML='<div class="modal-box"><h3 style="color:var(--red)">เริ่มเคสใหม่</h3><div class="modal-sub">ข้อมูลทั้งหมดจะหายไป ดำเนินการต่อ?</div><div class="modal-actions"><button class="btn btn-danger btn-sm" id="resetConfirmYes">ยืนยัน</button><button class="btn btn-cancel btn-sm" id="resetConfirmNo">ยกเลิก</button></div></div>';
  document.body.appendChild(confirmOverlay);
  document.getElementById('resetConfirmNo').onclick=function(){confirmOverlay.remove()};
  document.getElementById('resetConfirmYes').onclick=function(){confirmOverlay.remove();showCase()};
  confirmOverlay.onclick=function(e){if(e.target===confirmOverlay)confirmOverlay.remove()};
}

function showLoading(callback){
  var duration=2000+Math.random()*2000;
  var msgs=lang.msgs;
  loadingSub.textContent=msgs[Math.floor(Math.random()*msgs.length)];loading.classList.add('show');
  var start=Date.now();
  var iv=setInterval(function(){var r=Math.max(0,(duration-(Date.now()-start))/1000);loadingTimer.textContent=r.toFixed(1);if(r<=0){clearInterval(iv);loading.classList.remove('show');callback()}},50);
}
function showDramaticResult(type, suspect, callback){
  var theme={
    innocent:{
      cls:'innocent', msg:'ผลการตรวจสอบ', reveal:'ผู้ต้องสงสัย '+suspect, sub:'เป็นผู้บริสุทธิ์',
      shake:false, duration:10000, steps:['กำลังวิเคราะห์ดีเอ็นเอ...','ตรวจสอบลายพิมพ์ดีเอ็นเอ...','เปรียบเทียบกับฐานข้อมูล...','วิเคราะห์ความสัมพันธ์ทางพันธุกรรม...','ตรวจสอบหลักฐานเพิ่มเติม...','ไม่พบความเชื่อมโยง','ยืนยันผลลัพธ์...','ประมวลผลครั้งสุดท้าย...','✔ ผู้บริสุทธิ์']
    },
    fail:{
      cls:'', msg:'❌ ระบุตัวตนผิดพลาด', reveal:'ผู้ต้องสงสัย '+suspect, sub:'ความจริงไม่อาจปกปิด — ระบบถูกโจมตี',
      shake:true, duration:10000, steps:['WARNING','CRITICAL ERROR','IDENTITY MISMATCH','SYSTEM FAILURE','ACCESS DENIED','SECURITY BREACH','DATA CORRUPT','LINK SEVERED','SYSTEM PURGED','☠ TERMINATED']
    },
    guilty:{
      cls:'guilty', msg:'✅ จับคนร้ายได้!', reveal:'ผู้ต้องสงสัย '+suspect, sub:'เป็นผู้กระทำผิด — คดีปิด',
      shake:false, duration:10000, steps:['ตรวจสอบดีเอ็นเอ...','วิเคราะห์ลายพิมพ์...','ดีเอ็นเอตรงกัน 95%','ตรวจสอบยืนยันอีกครั้ง...','ดีเอ็นเอตรงกัน 99.9%','ดีเอ็นเอตรงกัน 100%','เชื่อมโยงข้อมูลสำเร็จ','ยืนยันตัวตน...','✔ ระบุตัวตนได้']
    }
  };
  var s=theme[type]; dramatic.className='dramatic-overlay show'+(s.cls?' '+s.cls:'');
  dramaticMsg.textContent=s.msg; dramaticReveal.textContent=s.reveal; dramaticSub.textContent=s.sub;
  if(s.shake){desktop.style.animation='shakeHard .8s ease-out';setTimeout(function(){desktop.style.animation=''},800)}
  var t=0; dramaticCounter.textContent=s.steps[0]; dramaticCounter.style.display='block';
  var stepTime=s.duration/s.steps.length;
  var iv=setInterval(function(){t++;if(t>=s.steps.length){clearInterval(iv);dramatic.classList.remove('show');callback()}else{dramaticCounter.textContent=s.steps[t]}},stepTime);
}
function showToast(correct,suspect,sub){
  toast.className='result-toast show '+(correct?'correct':'wrong');toastOverlay.className='toast-overlay show';
  toastIcon.textContent=correct?'\u2714':'\u2718';toastMsg.textContent=correct?__('cor'):__('wrong');
  toastSub.textContent=sub||(correct?__('guilty',suspect):__('innocent',suspect));
  setTimeout(function(){toast.className='result-toast';toastOverlay.className='toast-overlay'},2500);
}
function checkAnswer(){
  if(!activeCase){showCase();return}
  var ans=answerInput.value.trim().toUpperCase();
  if(order.indexOf(ans)===-1||innocentList.indexOf(ans)!==-1){return}
  closeModal();var correct=ans===cases[activeCase];
  var colIdx=shuffledOrder.indexOf(ans);
  var fromEl=document.getElementById('identifyBtn');
  var ths=document.querySelectorAll('#dna thead th');
  var targetTh=ths[colIdx+1];
  if(fromEl&&targetTh){
    var fromRect=fromEl.getBoundingClientRect();
    var toRect=targetTh.getBoundingClientRect();
    animateBeamRect(fromRect,toRect,correct?'#00ff96':'#ff4d6a',function(){
      identifiedCols[colIdx]=ans;
      if(correct){
        wrongCount=0;revealedState={guilty:ans,correct:true};go.disabled=true;identifyBtn.disabled=true;
        showDramaticResult('guilty',ans,function(){draw();renderProfiles();showToast(true,ans,'✔ จับคนร้ายได้ — '+ans)})
      }else{
        wrongCount++;innocentList.push(ans);
        if(wrongCount>=2){showDramaticResult('fail',cases[activeCase],function(){revealedState={guilty:cases[activeCase]};go.disabled=true;identifyBtn.disabled=true;draw();renderProfiles()})}
        else{showDramaticResult('innocent',ans,function(){draw();renderProfiles();showToast(false,ans,__('oneLeft'))})}
      }
    },function(){
      targetTh.textContent=ans;targetTh.style.color=correct?'#00ff96':'#ff9f1c';
    });
  }else{
    if(correct){wrongCount=0;revealedState={guilty:ans,correct:true};go.disabled=true;identifyBtn.disabled=true;showDramaticResult('guilty',ans,function(){draw();renderProfiles();showToast(true,ans,'✔ จับคนร้ายได้ — '+ans)})}
    else{wrongCount++;innocentList.push(ans);if(wrongCount>=2){showDramaticResult('fail',cases[activeCase],function(){revealedState={guilty:cases[activeCase]};go.disabled=true;identifyBtn.disabled=true;draw();renderProfiles()})}else{showDramaticResult('innocent',ans,function(){draw();renderProfiles();showToast(false,ans,__('oneLeft'))})}}
  }
}

loadLayout();
// Start
showCase();
})();
